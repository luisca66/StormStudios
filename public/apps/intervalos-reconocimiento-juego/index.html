<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synth-Kong - Retro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-B5-Kv6J0.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CKRiSMH4.css">
  </head>
  <body>
    <div class="grid-bg"></div>
    <div id="app">
      <!-- Config Screen -->
      <section id="config-screen" class="screen active">
        <div class="glass-panel">
          <h1 class="retro-title" data-i18n="app.title">Synth-Kong</h1>
          <p class="subtitle" data-i18n="app.subtitle">Entrenamiento Auditivo Avanzado</p>
          
          <div class="config-group">
            <h3 data-i18n="config.intervals">Seleccionar Intervalos</h3>
            <div id="interval-options" class="checkbox-grid" style="grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));">
              <!-- Rendered via JS -->
            </div>
          </div>

          <div class="config-group">
            <h3 data-i18n="config.timbre">Timbre (Instrumento)</h3>
            <div class="radio-group" style="flex-wrap: wrap;">
              <label class="retro-radio"><input type="radio" name="timbre" value="Piano" checked /> <span data-i18n="timbre.piano">Piano</span></label>
              <label class="retro-radio"><input type="radio" name="timbre" value="Coro" /> <span data-i18n="timbre.choir">Coro</span></label>
              <label class="retro-radio"><input type="radio" name="timbre" value="Corno" /> <span data-i18n="timbre.horn">Corno</span></label>
              <label class="retro-radio"><input type="radio" name="timbre" value="Cello" /> <span data-i18n="timbre.cello">Cello</span></label>
              <label class="retro-radio"><input type="radio" name="timbre" value="Fagot" /> <span data-i18n="timbre.bassoon">Fagot</span></label>
              <label class="retro-radio"><input type="radio" name="timbre" value="Random" /> <span data-i18n="timbre.random">Aleatorio</span></label>
            </div>
          </div>

          <div class="config-group">
            <h3 data-i18n="config.playMode">Modo de Reproduccion</h3>
            <div class="radio-group" style="flex-wrap: wrap;">
              <label class="retro-radio"><input type="radio" name="playMode" value="harmonic" checked /> <span data-i18n="playMode.harmonic">Armonico</span></label>
              <label class="retro-radio"><input type="radio" name="playMode" value="melodic" /> <span data-i18n="playMode.melodic">Melodico</span></label>
              <label class="retro-radio"><input type="radio" name="playMode" value="random" /> <span data-i18n="playMode.random">Aleatorio</span></label>
            </div>
          </div>

          <button id="start-button" class="retro-btn primary-btn" data-i18n="action.start">
            INICIAR PARTIDA
          </button>
        </div>
        <p class="credit" data-i18n="credit">Desarrollado por Luis Cardenas para Storm Studios Learning</p>
      </section>

      <!-- Game Screen -->
      <section id="game-screen" class="screen hidden">
        <header class="game-hud">
          <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <button id="return-menu-btn" class="retro-btn secondary-btn" style="font-size: 0.6rem; padding: 0.3rem 0.8rem; width: auto; letter-spacing: 1px;" data-i18n="action.back">VOLVER</button>
            <div class="hud-item"><span data-i18n="hud.sector">SECTOR</span> <br><span id="floor-display">0</span><span>/20</span></div>
          </div>
          <h2 class="retro-title" style="font-size: 1.5rem; margin: 0;" data-i18n="hud.heading">RUMBO AL PLANETA</h2>
          <div class="hud-item"><span data-i18n="hud.errors">ERRORES</span> <br><span id="error-display">0</span></div>
        </header>

        <div class="game-layout-row">
          <main class="game-area">
            <div id="space-scene">
              <div class="nebula"></div>
              <div class="star-layer star-far"></div>
              <div class="star-layer star-mid"></div>
              <div class="star-layer star-near"></div>

              <div id="planet">
                <div class="planet-glow"></div>
                <div class="planet-body"></div>
                <div class="planet-ring"></div>
              </div>

              <div id="player-sprite" class="hero-idle">
                <div class="thruster"></div>
                <svg viewBox="0 0 100 100" style="width: 100%; height: 100%;">
                  <path d="M 20 50 Q 50 10 80 50 L 80 80 L 20 80 Z" fill="rgba(15, 23, 42, 0.8)" stroke="#00e5ff" stroke-width="2"/>
                  <rect x="25" y="40" width="50" height="40" rx="10" fill="#2dd4bf"/>
                  <rect x="30" y="45" width="40" height="15" rx="5" fill="#ff4fbf" opacity="0.8"/>
                  <line x1="35" y1="52" x2="65" y2="52" stroke="#fff" stroke-width="2" opacity="0.5"/>
                  <path d="M 35 65 Q 50 75 65 65" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
                  <circle cx="20" cy="55" r="8" fill="#ffd35c"/>
                  <circle cx="80" cy="55" r="8" fill="#ffd35c"/>
                  <line x1="50" y1="40" x2="50" y2="20" stroke="#00e5ff" stroke-width="3"/>
                  <circle cx="50" cy="20" r="4" fill="#ff4fbf"/>
                </svg>
              </div>
            </div>
          </main>

          <footer class="game-controls">
            <div style="display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px;">
              <label for="game-volume" style="font-size: 0.8em; color: rgba(255,255,255,0.7); font-family: var(--font-retro);" data-i18n="volume.short">VOL</label>
              <input type="range" id="game-volume" min="0" max="1" step="0.01" value="0.72" style="width: 150px;" />
            </div>
            <button id="replay-btn" class="retro-btn secondary-btn" data-i18n="action.replay">REPETIR AUDIO (Espacio)</button>
            <div id="answer-buttons" class="answer-grid">
              <!-- Buttons generated here -->
            </div>
          </footer>
        </div>
      </section>
    </div>
  </body>
</html>

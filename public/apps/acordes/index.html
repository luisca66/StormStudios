<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordes - Entrenamiento Auditivo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />


    <style>
      /* Additional helper classes not in imported CSS */
      .hidden { display: none !important; }
      .app-shell { position: relative; }

      /* Grid for chords in Game */
      .answers-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding-bottom: 80px;
      }

      .mode-card:focus-visible {
        outline: 3px solid var(--blue);
        outline-offset: 3px;
      }
    </style>
  <script type="module" crossorigin src="/apps/acordes/assets/index-BbNg9fCN.js"></script>
  <link rel="stylesheet" crossorigin href="/apps/acordes/assets/index-sT5qVKmg.css">
</head>
<body>
    <div id="app" class="app-shell" aria-live="polite">

        <!-- SPLASH SCREEN -->
        <main id="screen-splash" class="screen active">
            <div style="flex:1; display:flex; align-items:center; justify-content:center;">
                <h1 class="title">Acordes</h1>
            </div>
        </main>

        <!-- MENU SCREEN -->
        <main id="screen-menu" class="screen hidden">
            <header class="topline">
                <div class="brand-lockup">
                    <div class="logo-mark" aria-hidden="true">🎵</div>
                    <div>
                        <div class="eyebrow">Entrenamiento Auditivo</div>
                        <h1 class="title">Acordes</h1>
                    </div>
                </div>
            </header>

            <section class="mode-list">
                <h2 class="screen-title">Modos de Juego</h2>

                <button type="button" class="mode-card" data-action="mode-classic" data-accent="blue">
                    <span class="mode-icon" aria-hidden="true">📚</span>
                    <span class="mode-body">
                        <span class="mode-title" style="display:block;">Modo Clásico</span>
                        <span class="mode-subtitle subtitle">10 rondas para practicar a tu ritmo</span>
                    </span>
                </button>

                <button type="button" class="mode-card" data-action="mode-time" data-accent="amber">
                    <span class="mode-icon" aria-hidden="true">⏱️</span>
                    <span class="mode-body">
                        <span class="mode-title" style="display:block;">Contrarreloj</span>
                        <span class="mode-subtitle subtitle">Máximo puntaje antes del límite</span>
                    </span>
                </button>

                <button type="button" class="mode-card" data-action="mode-survival" data-accent="rose">
                    <span class="mode-icon" aria-hidden="true">❤️</span>
                    <span class="mode-body">
                        <span class="mode-title" style="display:block;">Supervivencia</span>
                        <span class="mode-subtitle subtitle">3 errores y estás fuera</span>
                    </span>
                </button>

                <button class="secondary-button" data-action="open-stats" style="margin-top:20px;">
                    📊 Ver Estadísticas
                </button>
            </section>
        </main>

        <!-- CONFIG SCREEN -->
        <main id="screen-config" class="screen hidden">
            <header class="header-row">
                <button class="back-button" type="button" data-action="nav-back">
                    <span aria-hidden="true">&lt;</span>
                </button>
                <div class="screen-heading">
                    <div class="eyebrow">Configuración</div>
                    <h1 class="screen-title">Opciones</h1>
                </div>
            </header>

            <section class="setup-list">

                <div class="setup-section" id="time-limit-group">
                    <div class="section-label">Tiempo Total</div>
                    <div class="chip-row">
                        <select id="time-limit-select" class="chip mono">
                            <option value="60">60 Segundos</option>
                            <option value="90">90 Segundos</option>
                            <option value="120">120 Segundos</option>
                        </select>
                    </div>
                </div>

                <div class="setup-section">
                    <div class="section-label">Instrumento</div>
                    <div class="chip-row" id="instrument-options">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div class="setup-section">
                    <div class="section-label">Rango de Notas</div>
                    <div class="chip-row" style="align-items:center;">
                        <select id="range-start" class="chip mono"></select>
                        <span class="subtitle">a</span>
                        <select id="range-end" class="chip mono"></select>
                    </div>
                </div>

                <div class="setup-section">
                    <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
                        Acordes Disponibles
                        <button class="ghost-button" id="toggle-all-chords" style="font-size:0.8rem; min-height:auto; padding:2px 6px;">Invertir Selección</button>
                    </div>
                    <div class="chip-row" id="chords-options">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div class="setup-section">
                    <div class="volume-head">
                        <div class="section-label">Volumen Global</div>
                        <div class="volume-value" id="config-volume-display">80%</div>
                    </div>
                    <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.8">
                </div>

            </section>

            <div class="sticky-action">
                <button class="primary-button" id="btn-start-game">Comenzar</button>
            </div>
        </main>

        <!-- GAME SCREEN -->
        <main id="screen-game" class="screen hidden game-screen">
            <header class="game-toolbar">
                <button class="back-button" data-action="nav-back">
                    <span aria-hidden="true">&lt; Salir</span>
                </button>

                <div class="stat-cluster">
                    <div class="stat-pill" id="game-lives-container">
                        <div class="hearts" id="game-lives">❤️❤️❤️</div>
                    </div>

                    <div class="stat-pill">
                        <span class="stat-value" id="game-score">0</span>
                        <span class="stat-label">Puntos</span>
                    </div>

                    <div class="stat-pill hidden" id="game-timer-container">
                        <span class="stat-value danger" id="game-timer">60</span>
                        <span class="stat-label">Segundos</span>
                    </div>
                </div>
            </header>

            <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height: 200px;">
                <button class="primary-button" id="btn-play-sound" style="width:120px; height:120px; border-radius:50%; font-size:2rem;">🔊</button>
                <div style="margin-top:10px; width:100%; max-width:200px;">
                    <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.8">
                </div>
            </div>

            <div class="answers-grid" id="answers-grid">
                <!-- Dynamically populated -->
            </div>
        </main>

        <!-- STATS SCREEN -->
        <main id="screen-stats" class="screen hidden">
            <header class="header-row">
                <button class="back-button" type="button" data-action="nav-back">
                    <span aria-hidden="true">&lt;</span>
                </button>
                <div class="screen-heading">
                    <div class="eyebrow">Tu Rendimiento</div>
                    <h1 class="screen-title">Estadísticas</h1>
                </div>
            </header>

            <section class="stats-list">
                <div class="stat-row-card" style="padding:16px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div class="stat-label">Partidas Jugadas</div>
                        <div class="stat-value" id="stat-total-games">0</div>
                    </div>
                </div>

                <div class="setup-section" style="margin-top:20px;">
                    <div class="section-label">Precisión por Acorde</div>
                    <div id="stats-chords-list" style="display:grid; gap:10px;">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </section>

            <div class="sticky-action">
                <button class="secondary-button" id="btn-clear-stats" style="width:100%; border-color:var(--error); color:var(--error);">Borrar Estadísticas</button>
            </div>
        </main>

        <!-- FEEDBACK OVERLAY -->
        <div id="feedback-overlay" class="panel hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); padding:2rem; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.5); z-index:1000; display:flex; flex-direction:column; gap:10px;">
            <div id="feedback-icon" style="font-size:4rem; margin-bottom:10px;">✅</div>
            <h2 class="feedback-title" id="feedback-message">¡Correcto!</h2>
            <p class="subtitle" id="feedback-sub"></p>
        </div>
    </div>

</body>
</html>

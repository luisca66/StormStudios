<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StormStudios Workstation v3.0</title>
    <!-- Prevent favicon 404 error with inline SVG -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2310b981'/%3E%3Crect x='4' y='8' width='3' height='16' fill='white'/%3E%3Crect x='10' y='8' width='3' height='16' fill='white'/%3E%3Crect x='16' y='8' width='3' height='16' fill='white'/%3E%3Crect x='22' y='8' width='3' height='16' fill='white'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vexflow@4.2.2/releases/vexflow-debug.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            margin: 0;
            padding: 0;
        }

        /* DAW-style card aesthetic */
        .daw-card {
            background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
            border: 2px solid #475569;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .title-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #output { position: relative; display: inline-block; white-space: nowrap; }
        #output svg { cursor: default; display: block; }
        .vf-stavenote { cursor: grab; transition: opacity 0.1s; }
        .vf-stavenote:active { cursor: grabbing; }
        .vf-stavenote:hover { opacity: 0.8; }

        #canvas-container {
            user-select: none;
            outline: none;
            overflow-x: auto;
            position: relative;
            text-align: left;
            background: #ffffff;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #playback-cursor {
            position: absolute; top: 50px; left: 0; width: 3px; height: 450px;
            background: linear-gradient(to bottom, #ef4444, #dc2626);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
            pointer-events: none; z-index: 50; display: none; transition: left 0.05s linear;
        }

        input[type=range] { accent-color: #10b981; }
        .acc-btn { font-family: 'Times New Roman', serif; font-size: 1.5rem; line-height: 1; }

        .custom-scrollbar::-webkit-scrollbar { height: 14px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; border: 3px solid #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 16px; height: 16px; border-radius: 50%;
            border-left-color: #10b981;
            animation: spin 1s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .separator { width: 2px; height: 50px; background: linear-gradient(to bottom, transparent, #475569, transparent); }

        /* Note Icons SVG Container */
        .note-icon {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        /* Glow effects */
        .glow-green {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }
        .glow-red {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        #cipher-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .cipher-input {
            position: absolute;
            width: 70px;
            padding: 4px 6px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #10b981;
            color: #10b981;
            border-radius: 6px;
            outline: none;
            pointer-events: auto;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        /* Visual connector: line connecting note to cipher input */
        .cipher-input::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 15px;
            background: linear-gradient(to bottom, transparent, #10b981);
            opacity: 0.5;
        }

        /* Visual connector: dot at top of line */
        .cipher-input::after {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: #10b981;
            border-radius: 50%;
            opacity: 0.7;
        }

        .cipher-input:focus {
            border-color: #34d399;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
            background: rgba(15, 23, 42, 0.95);
        }

        .cipher-input:focus::before {
            opacity: 0.8;
            background: linear-gradient(to bottom, transparent, #34d399);
        }

        .cipher-input:focus::after {
            opacity: 1;
            background: #34d399;
            width: 6px;
            height: 6px;
        }

        .cipher-input:hover {
            border-color: #34d399;
        }

        .cipher-input:hover::before {
            opacity: 0.6;
        }

        .cipher-input:hover::after {
            opacity: 0.85;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-3 text-slate-100" onkeydown="handleKeyDown(event)">

    <div class="max-w-[2500px] w-full mx-auto bg-slate-900 rounded-2xl shadow-2xl border-4 border-slate-700 overflow-hidden">

        <!-- HEADER ULTRA COMPACTO -->
        <div class="flex justify-between items-center px-6 py-2 bg-gradient-to-r from-slate-800 to-slate-900 border-b-2 border-slate-700">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-black title-gradient tracking-tight leading-none">StormStudios Workstation v3.0</h1>
                    <div class="text-[7px] font-medium text-slate-500 uppercase tracking-widest">v3.0</div>
                </div>
            </div>

            <button onclick="clearScore()" class="px-3 py-1.5 text-xs font-bold text-red-400 bg-red-950 border-2 border-red-800 rounded-lg hover:bg-red-900 hover:border-red-600 transition-all uppercase tracking-wide">
                🗑️ Clear
            </button>
        </div>

        <!-- CONTROLES GLOBALES - 3 CARDS EN UNA FILA -->
        <div class="grid grid-cols-3 gap-3 p-3 bg-slate-900">

            <!-- CARD 1: PROYECTO -->
            <div class="daw-card rounded-xl p-4 space-y-3">
                <div class="flex items-center gap-2 pb-2 border-b-2 border-slate-600">
                    <div class="w-2 h-2 rounded-full bg-blue-500 shadow-lg shadow-blue-500/50"></div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-wider">Project</h3>
                </div>
                <div class="space-y-2">
                    <div>
                        <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Instrument</label>
                        <select id="instrument-select" onchange="handleInstrumentChange()" class="w-full bg-slate-700 border-2 border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2 outline-none font-semibold transition">
                            <option value="Sinte">🎹 Synth (Osc)</option>
                            <option value="Piano" selected>Piano</option>
                            <option value="Cello">Cello</option>
                            <option value="Corno">Horn</option>
                            <option value="Coro">Choir</option>
                            <option value="Fagot">Bassoon</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Mode</label>
                        <select id="mode-select" onchange="handleModeChange()" class="w-full bg-slate-700 border-2 border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2 outline-none font-medium transition">
                            <option value="single" selected>Single Melody</option>
                            <option value="quartet">SATB Quartet</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- CARD 2: NOTACIÓN -->
            <div class="daw-card rounded-xl p-4 space-y-3">
                <div class="flex items-center gap-2 pb-2 border-b-2 border-slate-600">
                    <div class="w-2 h-2 rounded-full bg-purple-500 shadow-lg shadow-purple-500/50"></div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-wider">Notation</h3>
                </div>
                <div class="space-y-2">
                    <div>
                        <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Key</label>
                        <select id="key-sig-select" onchange="updateDraftSettings()" class="w-full bg-slate-700 border-2 border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 p-2 outline-none font-medium transition">
                            <optgroup label="Natural / Sharps">
                                <option value="C" selected>C Major</option>
                                <option value="G">G (1#)</option>
                                <option value="D">D (2#)</option>
                                <option value="A">A (3#)</option>
                                <option value="E">E (4#)</option>
                                <option value="B">B (5#)</option>
                                <option value="F#">F# (6#)</option>
                                <option value="C#">C# (7#)</option>
                            </optgroup>
                            <optgroup label="Flats">
                                <option value="F">F (1b)</option>
                                <option value="Bb">Bb (2b)</option>
                                <option value="Eb">Eb (3b)</option>
                                <option value="Ab">Ab (4b)</option>
                                <option value="Db">Db (5b)</option>
                                <option value="Gb">Gb (6b)</option>
                                <option value="Cb">Cb (7b)</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-1 block">Time Sig</label>
                        <select id="time-sig-select" onchange="updateDraftSettings()" class="w-full bg-slate-700 border-2 border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 p-2 outline-none font-medium transition">
                            <option value="4/4">4/4</option>
                            <option value="3/4">3/4</option>
                            <option value="2/4">2/4</option>
                            <option value="6/8">6/8</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- CARD 3: PLAYBACK -->
            <div class="daw-card rounded-xl p-4 space-y-3">
                <div class="flex items-center gap-2 pb-2 border-b-2 border-slate-600">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50"></div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-wider">Playback</h3>
                </div>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between items-baseline mb-2">
                            <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Tempo</label>
                            <span id="tempo-display" class="text-2xl font-black text-emerald-400">100</span>
                        </div>
                        <input type="range" id="tempo-slider" min="40" max="220" value="100" oninput="updateTempoDisplay()" class="w-full h-3 bg-slate-700 rounded-lg cursor-pointer accent-emerald-500">
                        <div class="flex justify-between text-[7px] text-slate-500 mt-1">
                            <span>40</span>
                            <span>220 BPM</span>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-baseline mb-2">
                            <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Volume</label>
                            <span id="volume-display" class="text-2xl font-black text-emerald-400">80</span>
                        </div>
                        <input type="range" id="volume-slider" min="0" max="100" value="80" oninput="updateVolumeDisplay()" class="w-full h-3 bg-slate-700 rounded-lg cursor-pointer accent-emerald-500">
                        <div class="flex justify-between text-[7px] text-slate-500 mt-1">
                            <span>0</span>
                            <span>100</span>
                        </div>
                    </div>
                    <!-- METRONOME -->
                    <div class="pt-3 mt-2 border-t-2 border-slate-600">
                        <div class="flex justify-between items-baseline mb-2">
                            <label class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Metronome</label>
                            <span class="text-[10px] font-black text-emerald-400"><span id="metronome-bpm">100</span> BPM</span>
                        </div>
                        <button id="btn-metronome" onclick="toggleMetronome()" class="w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg shadow-lg border-2 border-slate-600 font-bold text-xs uppercase tracking-wide transition-all flex items-center justify-center gap-2" title="Metronome">
                            <span id="metronome-icon" class="text-lg">♩</span>
                            <span id="metronome-label">Metronome OFF</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- MEASURE CONTROLS & VOICES -->
        <div class="flex flex-wrap gap-2 items-center px-3 pb-3 bg-slate-900">
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-2 rounded-lg border-2 border-slate-600">
                <button onclick="applyToSelectedMeasure()" id="btn-apply-measure" class="text-xs font-bold text-blue-400 hover:text-blue-300 flex items-center gap-1 transition">
                    <span>⚡</span>
                    <span>Apply to Measure</span>
                </button>
                <div class="w-px h-4 bg-slate-600"></div>
                <select id="clef-select" onchange="updateDraftSettings()" class="bg-transparent text-xs font-bold text-slate-300 outline-none cursor-pointer hover:text-white">
                    <option value="treble">Treble Clef</option>
                    <option value="bass">Bass Clef</option>
                </select>
            </div>

            <div id="voice-controls" class="hidden flex items-center gap-2 bg-slate-800 px-3 py-2 rounded-lg border-2 border-slate-600">
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-wider">Voz:</span>
                <div class="flex gap-2">
                    <button type="button" id="btn-voice-soprano" onclick="setActiveTrack('soprano')" class="px-4 py-2 rounded-lg border-2 text-sm font-black transition-all">S</button>
                    <button type="button" id="btn-voice-alto" onclick="setActiveTrack('alto')" class="px-4 py-2 rounded-lg border-2 text-sm font-black transition-all">A</button>
                    <button type="button" id="btn-voice-tenor" onclick="setActiveTrack('tenor')" class="px-4 py-2 rounded-lg border-2 text-sm font-black transition-all">T</button>
                    <button type="button" id="btn-voice-bass" onclick="setActiveTrack('bass')" class="px-4 py-2 rounded-lg border-2 text-sm font-black transition-all">B</button>
                </div>
            </div>

            <div id="loading-indicator" class="hidden text-xs font-medium text-emerald-400 bg-emerald-950 px-3 py-2 rounded-lg border-2 border-emerald-800 animate-pulse">
                <span class="spinner mr-2"></span> Loading...
            </div>
        </div>

        <!-- VIEW TOGGLE - Piano Roll / Staff -->
        <div class="flex gap-2 items-center px-3 pb-3 bg-slate-900">
            <div class="flex items-center gap-2 bg-slate-800 px-1.5 py-1.5 rounded-lg border-2 border-slate-600">
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-wider px-2">View:</span>
                <button type="button" id="btn-view-staff" onclick="setView('staff')"
                        class="px-6 py-2 rounded-lg border-2 text-sm font-bold transition-all bg-blue-600 text-white border-blue-400 shadow-lg shadow-blue-500/50">
                    Staff
                </button>
                <button type="button" id="btn-view-pianoroll" onclick="setView('pianoroll')"
                        class="px-6 py-2 rounded-lg border-2 text-sm font-bold transition-all bg-slate-700 text-slate-300 border-slate-600 hover:bg-slate-600">
                    Piano Roll
                </button>
            </div>
        </div>

        <!-- CANVAS AREA MÁS GRANDE -->
        <div id="canvas-container" class="relative flex overflow-x-auto border-y-4 border-slate-700 bg-white p-8 min-h-[580px] shadow-inner custom-scrollbar" tabindex="0">
            <div id="output" class="m-auto transition-transform duration-200">
                <div id="playback-cursor"></div>
            </div>
            <div id="cipher-overlay" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <!-- TOOLBARS REDISEÑADAS - FONDO OSCURO -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 bg-gradient-to-b from-slate-800 to-slate-900">

            <!-- 1. DURACIÓN DE NOTAS - BOTONES GIGANTES -->
            <div class="lg:col-span-5 space-y-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-blue-500 shadow-lg shadow-blue-500/50"></div>
                    <label class="text-xs font-black text-slate-300 uppercase tracking-wide">Note Duration</label>
                </div>
                <div class="flex gap-2 bg-slate-950 p-3 rounded-xl border-2 border-slate-700">
                    <button onclick="setDuration('w')" id="btn-w" class="duration-btn flex-1 py-6 rounded-xl shadow-lg flex flex-col items-center justify-center transition-all bg-slate-800 text-slate-300 hover:bg-slate-700 border-2 border-slate-600">
                        <svg class="note-icon" viewBox="0 0 24 24">
                            <ellipse cx="12" cy="16" rx="5" ry="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                    <button onclick="setDuration('h')" id="btn-h" class="duration-btn flex-1 py-6 rounded-xl shadow-lg flex flex-col items-center justify-center transition-all bg-slate-800 text-slate-300 hover:bg-slate-700 border-2 border-slate-600">
                        <svg class="note-icon" viewBox="0 0 24 24">
                            <ellipse cx="10" cy="16" rx="5" ry="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="15" y1="16" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                    <button onclick="setDuration('q')" id="btn-q" class="duration-btn flex-1 py-6 rounded-xl shadow-2xl flex flex-col items-center justify-center transition-all bg-blue-600 text-white border-2 border-blue-400 ring-4 ring-blue-500/50">
                        <svg class="note-icon" viewBox="0 0 24 24">
                            <ellipse cx="10" cy="16" rx="5" ry="3.5" fill="currentColor"/>
                            <line x1="15" y1="16" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                    <button onclick="setDuration('8')" id="btn-8" class="duration-btn flex-1 py-6 rounded-xl shadow-lg flex flex-col items-center justify-center transition-all bg-slate-800 text-slate-300 hover:bg-slate-700 border-2 border-slate-600">
                        <svg class="note-icon" viewBox="0 0 24 24">
                            <ellipse cx="10" cy="16" rx="5" ry="3.5" fill="currentColor"/>
                            <line x1="15" y1="16" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M 15 4 L 18 6 L 18 8 L 15 6" fill="currentColor"/>
                        </svg>
                    </button>
                    <button onclick="setDuration('16')" id="btn-16" class="duration-btn flex-1 py-6 rounded-xl shadow-lg flex flex-col items-center justify-center transition-all bg-slate-800 text-slate-300 hover:bg-slate-700 border-2 border-slate-600">
                        <svg class="note-icon" viewBox="0 0 24 24">
                            <ellipse cx="10" cy="16" rx="5" ry="3.5" fill="currentColor"/>
                            <line x1="15" y1="16" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M 15 4 L 18 6 L 18 8 L 15 6 M 15 6 L 18 8 L 18 10 L 15 8" fill="currentColor"/>
                        </svg>
                    </button>
                    <button onclick="toggleDottedMode()" id="btn-dot" class="dot-btn w-14 py-6 rounded-xl shadow-lg flex flex-col items-center justify-center transition-all bg-slate-800 text-slate-300 hover:bg-slate-700 border-2 border-slate-600" title="Dotted">
                        <span class="text-2xl font-black leading-none">•</span>
                    </button>
                </div>
            </div>

            <!-- 2. ALTERACIONES & ARTICULACIÓN -->
            <div class="lg:col-span-4 space-y-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-purple-500 shadow-lg shadow-purple-500/50"></div>
                    <label class="text-xs font-black text-slate-300 uppercase tracking-wide">Accidentals & Articulation</label>
                </div>
                <div class="flex gap-3 bg-slate-950 p-3 rounded-xl border-2 border-slate-700 h-[100px] items-center">
                    <div class="flex gap-2 flex-1">
                        <button onclick="applyAccidental('##')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg acc-btn border-2 border-slate-600 h-16 transition-all text-sm font-bold" title="Double sharp">𝄪</button>
                        <button onclick="applyAccidental('#')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg acc-btn border-2 border-slate-600 h-16 transition-all" title="Sharp">♯</button>
                        <button onclick="applyAccidental('n')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg acc-btn border-2 border-slate-600 h-16 transition-all" title="Natural">♮</button>
                        <button onclick="applyAccidental('b')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg acc-btn border-2 border-slate-600 h-16 transition-all" title="Flat">♭</button>
                        <button onclick="applyAccidental('bb')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg acc-btn border-2 border-slate-600 h-16 transition-all text-sm font-bold" title="Double flat">𝄫</button>
                    </div>
                    <div class="separator"></div>
                    <div class="flex gap-2">
                        <button onclick="toggleTie()" class="px-4 bg-purple-900 hover:bg-purple-800 text-purple-300 border-2 border-purple-600 rounded-xl shadow-lg font-bold text-2xl h-16 flex items-center justify-center transition-all" title="Tie">◡</button>
                        <button onclick="toggleOrnament()" class="px-4 bg-red-900 hover:bg-red-800 text-red-300 border-2 border-red-600 rounded-xl shadow-lg font-bold text-2xl h-16 flex items-center justify-center transition-all" title="Ornament">+</button>
                    </div>
                </div>
            </div>

            <!-- 3. EDICIÓN & ACCIONES -->

    <script>

        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        document.addEventListener('mousemove', handleGlobalMouseMove);

        // --- AUDIO ENGINE ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!masterGain) {
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.8; // Default volume 80%
                masterGain.connect(audioCtx.destination);
            }
        }

        function handleInstrumentChange() {
            const sel = document.getElementById('instrument-select');
            projectData.instrument = sel.value;
        }

        function preloadAllSamples() {
            const octaves = [1, 2, 3, 4, 5, 6];
            const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            // Silently preload samples in background
            INSTRUMENTS.forEach(inst => {
                octaves.forEach(oct => {
                    notes.forEach(note => {
                        const sampleKey = `${note}${oct}`;
                        if (!sampleCache[`${inst}_${sampleKey}`]) {
                            loadSample(inst, sampleKey).catch(() => {});
                        }
                    });
                });
            });
        }

        function getSampleKey(noteKey) {
            let [key, octaveStr] = noteKey.split('/');
            let octave = parseInt(octaveStr);
            let cleanKey = key.toLowerCase();
            // Single accidentals: flats → sharps
            const flatsToSharps = {
                'db': 'c#', 'eb': 'd#', 'gb': 'f#', 'ab': 'g#', 'bb': 'a#',
                'cb': 'b', 'fb': 'e'
            };
            // Double accidentals → nearest natural/sharp (with octave corrections for boundary cases)
            const doubleToNatural = {
                'c##': 'd', 'd##': 'e', 'e##': 'f#', 'f##': 'g',
                'g##': 'a', 'a##': 'b', 'b##': 'c#',  // b## crosses octave up
                'dbb': 'c', 'ebb': 'd', 'fbb': 'd#', 'gbb': 'f',
                'abb': 'g', 'bbb': 'a', 'cbb': 'a#'   // cbb crosses octave down
            };
            if (cleanKey === 'cbb') octave -= 1;
            if (cleanKey === 'b##') octave += 1;
            if (cleanKey === 'cb') octave -= 1;
            if (cleanKey === 'b#') octave += 1;
            if (doubleToNatural[cleanKey]) {
                cleanKey = doubleToNatural[cleanKey];
            } else if (flatsToSharps[cleanKey]) {
                cleanKey = flatsToSharps[cleanKey];
            } else if (cleanKey === 'fb') {
                cleanKey = 'e';
            } else if (cleanKey === 'b#') {
                cleanKey = 'c';
            } else if (cleanKey === 'e#') {
                cleanKey = 'f';
            } else {
                cleanKey = cleanKey.replace('n', '');
            }
            const notePart = cleanKey.charAt(0).toUpperCase() + cleanKey.slice(1);
            return `${notePart}${octave}`;
        }

        function getSampleUrl(instrument, sampleKey) {
            const safeKey = sampleKey.replace('#', '%23');
            return `${BASE_URL}/${instrument}/${safeKey}.mp3`;
        }

        async function loadSample(instrument, sampleKey) {
            const cacheKey = `${instrument}_${sampleKey}`;
            if (sampleCache[cacheKey]) return sampleCache[cacheKey];
            const url = getSampleUrl(instrument, sampleKey);
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const arrayBuffer = await response.arrayBuffer();
                if (!audioCtx) initAudio();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                sampleCache[cacheKey] = audioBuffer;
                return audioBuffer;
            } catch (error) {
                return null;
            }
        }

        function playSound(noteKey, duration, startTime) {
            if (projectData.instrument === 'Sinte') {
                playOscillator(getFrequency(noteKey), duration, startTime);
            } else {
                playSampleNote(projectData.instrument, noteKey, duration, startTime);
            }
        }

        async function playSampleNote(instrument, noteKey, duration, startTime) {
            const sampleKey = getSampleKey(noteKey);
            let buffer = sampleCache[`${instrument}_${sampleKey}`];
            if (!buffer) {
                document.getElementById('loading-indicator').classList.remove('hidden');
                buffer = await loadSample(instrument, sampleKey);
                document.getElementById('loading-indicator').classList.add('hidden');
            }
            if (!buffer) {
                playOscillator(getFrequency(noteKey), duration, startTime);
                return;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(SAMPLE_VOLUME, startTime);
            gainNode.gain.setValueAtTime(SAMPLE_VOLUME, startTime + duration - 0.05);
            gainNode.gain.linearRampToValueAtTime(0, startTime + duration);
            source.connect(gainNode);
            gainNode.connect(masterGain);
            source.start(startTime);
            source.stop(startTime + duration + 0.5);
            playbackState.activeNodes.push(source);
        }

        function playOscillator(freq, duration, startTime) {
            if (!freq) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
            gain.gain.linearRampToValueAtTime(0.3, startTime + duration - 0.05);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(startTime);
            osc.stop(startTime + duration + 0.1);
            playbackState.activeNodes.push(osc);
        }

        async function startPreviewSound(noteKey) {
            stopPreviewSound();
            if (!audioCtx) initAudio();
            if (projectData.instrument === 'Sinte') {
                const freq = getFrequency(noteKey);
                if (!freq) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                currentPreviewNote = { node: osc, gain: gain };
            } else {
                const sampleKey = getSampleKey(noteKey);
                let buffer = sampleCache[`${projectData.instrument}_${sampleKey}`];
                if (!buffer) {
                    buffer = await loadSample(projectData.instrument, sampleKey);
                }
                if (buffer) {
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(SAMPLE_VOLUME, audioCtx.currentTime);
                    source.connect(gain);
                    gain.connect(masterGain);
                    source.start();
                    currentPreviewNote = { node: source, gain: gain };
                }
            }
        }

        function stopPreviewSound() {
            if (currentPreviewNote) {
                const { node, gain } = currentPreviewNote;
                try {
                    const now = audioCtx.currentTime;
                    gain.gain.cancelScheduledValues(now);
                    gain.gain.setValueAtTime(gain.gain.value, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    node.stop(now + 0.1);
                } catch(e) {}
                currentPreviewNote = null;
            }
        }

        async function playScore() {
            initAudio();
            stopPlayback();
            if (projectData.instrument !== 'Sinte') {
                 const tracks = (projectData.mode === 'quartet') ? ['soprano', 'alto', 'tenor', 'bass'] : ['melody'];
                 const uniqueNotes = new Set();
                 tracks.forEach(trackName => {
                    const trackMap = getTrackMap(trackName);
                    for (let note of trackMap.values()) {
                        if (note.type === 'note') uniqueNotes.add(note.keys[0]);
                    }
                 });
                 const promises = [];
                 uniqueNotes.forEach(key => {
                     const sk = getSampleKey(key);
                     if (!sampleCache[`${projectData.instrument}_${sk}`]) {
                         promises.push(loadSample(projectData.instrument, sk));
                     }
                 });
                 if (promises.length > 0) {
                     document.getElementById('loading-indicator').classList.remove('hidden');
                     await Promise.all(promises);
                     document.getElementById('loading-indicator').classList.add('hidden');
                 }
            }

            const bpm = parseInt(document.getElementById('tempo-slider').value);
            const secondsPerQuarter = 60 / bpm;
            const secondsPerTick = secondsPerQuarter / TICKS_PER_QUARTER;
            const totalTicks = getTotalTicks();

            // Start playback from user-selected tick
            const startTick = Math.max(0, Math.min(playbackStartTick || 0, Math.max(0, totalTicks - 1)));

            let now = audioCtx.currentTime + 0.2;
            const tracks = (projectData.mode === 'quartet') ? ['soprano', 'alto', 'tenor', 'bass'] : ['melody'];

            tracks.forEach((trackName) => {
                const trackMap = getTrackMap(trackName);
                const sortedTicks = Array.from(trackMap.keys()).sort((a, b) => a - b);
                const processed = new Set();

                sortedTicks.forEach((tick) => {
                    if (processed.has(tick)) return;
                    const note = trackMap.get(tick);
                    if (!note || note.type !== 'note') return;

                    // Merge tied chains into a single sounding event
                    let accDur = DURATION_TICKS[note.duration] || 0;
                    let endTick = tick + accDur;

                    let cTick = tick;
                    let cNote = note;
                    while (cNote && cNote.isTied) {
                        const nxtTick = cTick + (DURATION_TICKS[cNote.duration] || 0);
                        const nxt = trackMap.get(nxtTick);
                        if (nxt && nxt.type === 'note' && nxt.keys && nxt.keys[0] === note.keys[0]) {
                            processed.add(nxtTick);
                            accDur += DURATION_TICKS[nxt.duration] || 0;
                            cTick = nxtTick;
                            cNote = nxt;
                            endTick = tick + accDur;
                        } else {
                            break;
                        }
                    }

                    // Skip notes that fully end before the startTick
                    if (endTick <= startTick) return;

                    // If a note starts before the startTick and sustains across it, truncate
                    let playStartTick = tick;
                    let playDurTicks = accDur;
                    if (tick < startTick) {
                        playStartTick = startTick;
                        playDurTicks = endTick - startTick;
                    }

                    const startOffsetTicks = playStartTick - startTick;
                    const durationSecs = playDurTicks * secondsPerTick;
                    const startSecs = now + (startOffsetTicks * secondsPerTick);
                    playSound(note.keys[0], durationSecs, startSecs);
                });
            });

            // --- METRONOME SCHEDULING (sync to playback cursor) ---
            scheduleMetronomeClicks(now, secondsPerTick, startTick, totalTicks);


            const cursor = document.getElementById('playback-cursor');
            const container = document.getElementById('canvas-container');
            cursor.style.display = 'block';

            // Initialize cursor at startTick immediately - use linear position for piano roll
            const xStart = (currentView === 'pianoroll') ? getLinearXForTick(startTick) : getXForTick(startTick);
            const displayXStart = (currentView === 'pianoroll') ? xStart + PIANO_ROLL_CONFIG.KEYBOARD_WIDTH : xStart;
            cursor.style.left = displayXStart + 'px';

            playbackState.startTime = now;
            playbackState.startTick = startTick;
            playbackState.isPlaying = true;

            function animate() {
                if (!playbackState.isPlaying) return;
                const currentTime = audioCtx.currentTime;
                const elapsed = currentTime - playbackState.startTime;
                if (elapsed < 0) {
                     playbackState.animationId = requestAnimationFrame(animate);
                     return;
                }

                const currentTickAbs = playbackState.startTick + (elapsed / secondsPerTick);
                if (currentTickAbs > totalTicks) {
                    stopPlayback();
                    return;
                }

                updateMonitor(currentTickAbs);
                // Use linear position for piano roll, VexFlow position for staff
                const xPos = (currentView === 'pianoroll') ? getLinearXForTick(currentTickAbs) : getXForTick(currentTickAbs);

                // In Piano Roll view, add keyboard width offset
                const displayXPos = currentView === 'pianoroll' ? xPos + PIANO_ROLL_CONFIG.KEYBOARD_WIDTH : xPos;
                cursor.style.left = displayXPos + 'px';

                const containerRect = container.getBoundingClientRect();
                const halfWidth = containerRect.width / 2;
                if (displayXPos > halfWidth) container.scrollLeft = displayXPos - halfWidth;
                else container.scrollLeft = 0;
                playbackState.animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        function stopPlayback() {
            playbackState.isPlaying = false;
            if (playbackState.animationId) cancelAnimationFrame(playbackState.animationId);
            document.getElementById('chord-monitor').innerText = "---";
            // Keep the cursor visible at the chosen start position
            setPlaybackStartTick(playbackStartTick);
            playbackState.activeNodes.forEach(node => {
                try { node.stop(); } catch(e) {}
            });
            playbackState.activeNodes = [];
            stopPreviewSound();
        }

        function updateMonitor(currentTick) {
            // Find which measure we're in
            let accumulatedTicks = 0;
            let currentMeasure = 0;
            let localTick = 0;

            for (let m = 0; m < totalMeasures; m++) {
                const measureTicks = getTicksForTimeSig(getSettingsForMeasure(m).time);
                if (currentTick >= accumulatedTicks && currentTick < accumulatedTicks + measureTicks) {
                    currentMeasure = m;
                    localTick = currentTick - accumulatedTicks;
                    break;
                }
                accumulatedTicks += measureTicks;
            }

            // Find the most recent cipher at or before current position
            const measureCiphers = cipherData[currentMeasure] || {};
            let foundText = null;
            let closestTick = -1;

            for (const [tick, text] of Object.entries(measureCiphers)) {
                const t = parseInt(tick);
                if (t <= localTick && t > closestTick && text.trim() !== '') {
                    closestTick = t;
                    foundText = text;
                }
            }

            document.getElementById('chord-monitor').innerText = foundText || "---";
        }

        function saveProject() {
            const json = serializeState();
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            a.href = url;
            a.download = "storm_workstation.json";
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        }

        function loadProject(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    restoreState(e.target.result);
                    undoStack.length = 0; redoStack.length = 0;
                } catch (err) { alert("Error cargando proyecto: " + err.message); }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function serializeState() {
            const tracksObj = {};
            for (const [name, map] of Object.entries(projectData.tracks)) {
                tracksObj[name] = Array.from(map.entries());
            }
            return JSON.stringify({
                projectData: { mode: projectData.mode, instrument: projectData.instrument, tracks: tracksObj },
                measureSettings: measureSettings,
                totalMeasures: totalMeasures,
                cipherData: { ...cipherData }
            });
        }

        function restoreState(jsonState) {
            const state = JSON.parse(jsonState);
            projectData.mode = state.projectData.mode;
            projectData.instrument = state.projectData.instrument || 'Sinte';
            for (const [name, entries] of Object.entries(state.projectData.tracks)) {
                projectData.tracks[name] = new Map(entries);
            }
            measureSettings = state.measureSettings;
            totalMeasures = state.totalMeasures;
            cipherData = state.cipherData || {};
            document.getElementById('mode-select').value = projectData.mode;
            document.getElementById('instrument-select').value = projectData.instrument;
            syncModeUI();
            selectedTick = null; selectedTrackName = null;
            renderCurrentView();
        }

        function saveState() {
            const state = serializeState();
            if (undoStack.length > 0 && undoStack[undoStack.length - 1] === state) return;
            undoStack.push(state);
            if (undoStack.length > MAX_HISTORY) undoStack.shift();
            redoStack.length = 0;
        }

        function undo() {
            if (undoStack.length === 0) return;
            redoStack.push(serializeState());
            restoreState(undoStack.pop());
        }

        function redo() {
            if (redoStack.length === 0) return;
            undoStack.push(serializeState());
            restoreState(redoStack.pop());
        }

        function getBeatTicksForTimeSig(timeSig) {
            const parts = (timeSig || '4/4').split('/').map(Number);
            const num = parts[0] || 4;
            const den = parts[1] || 4;
            const beatTicks = (4 / den) * TICKS_PER_QUARTER;
            return { beatsPerMeasure: num, beatTicks };
        }

        function playMetronomeClick(isDownbeat, startTime) {
            if (!audioCtx) initAudio();
            const freq = isDownbeat ? 1000 : 800;
            const vol  = isDownbeat ? 0.30 : 0.15;
            const dur  = 0.055;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, startTime);

            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.005);
            gain.gain.linearRampToValueAtTime(0, startTime + dur);

            osc.connect(gain);
            gain.connect(masterGain);

            osc.start(startTime);
            osc.stop(startTime + dur + 0.02);

            playbackState.activeNodes.push(osc);
        }

        function scheduleMetronomeClicks(playStartTime, secondsPerTick, startTick, totalTicks) {
            if (!metronomeEnabled) return;

            let currentAbsTick = 0;
            for (let m = 0; m < totalMeasures; m++) {
                const settings = getSettingsForMeasure(m);
                const measureTicks = getTicksForTimeSig(settings.time);
                const { beatsPerMeasure, beatTicks } = getBeatTicksForTimeSig(settings.time);

                for (let b = 0; b < beatsPerMeasure; b++) {
                    const beatAbsTick = currentAbsTick + (b * beatTicks);
                    if (beatAbsTick < startTick) continue;
                    if (beatAbsTick > totalTicks) return;
                    const t = playStartTime + ((beatAbsTick - startTick) * secondsPerTick);
                    playMetronomeClick(b === 0, t);
                }

                currentAbsTick += measureTicks;
            }
        }

        function getEffectiveDuration(baseDur) {
            if (!dottedMode) return baseDur;
            // No dotted sixteenth
            if (baseDur === '16' || baseDur === 's') return baseDur;
            // Eighth note (UI uses '8'; alias 'd')
            if (baseDur === '8' || baseDur === 'd') return 'd.';
            if (baseDur === 'w' || baseDur === 'h' || baseDur === 'q') return baseDur + '.';
            return baseDur;
        }

        function toVexDuration(dur) {
            if (!dur) return dur;
            const base = String(dur).endsWith('.') ? String(dur).slice(0, -1) : String(dur);
            if (base === 'd') return '8';
            if (base === 's') return '16';
            return base;
        }

        function snapDurationTicks(ticks) {
            const allowed = [24, 16, 12, 8, 6, 4, 3, 2, 1];
            let best = allowed[allowed.length - 1];
            let bestDist = 1e9;
            for (const a of allowed) {
                const d = Math.abs(ticks - a);
                if (d < bestDist) { bestDist = d; best = a; }
            }
            return best;
        }

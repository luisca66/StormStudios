        function applyAccidental(type) {
            if (selectedTick === null) return;
            const map = getTrackMap(getSelectedTrack());
            if (!map.has(selectedTick)) return;
            saveState();
            const note = map.get(selectedTick);
            let [keyName, octave] = note.keys[0].split('/');
            let baseKey = keyName.charAt(0);
            let currentAcc = keyName.slice(1); // existing accidental(s)
            let newKey;
            if (type === '##') {
                newKey = baseKey + '##';
            } else if (type === 'bb') {
                newKey = baseKey + 'bb';
            } else if (type === '#') {
                // # on a # → ## (double sharp); anything else → single #
                newKey = (currentAcc === '#') ? baseKey + '##' : baseKey + '#';
            } else if (type === 'b') {
                // b on a b → bb (double flat); anything else → single b
                newKey = (currentAcc === 'b') ? baseKey + 'bb' : baseKey + 'b';
            } else if (type === 'n') {
                newKey = baseKey + 'n';
            } else {
                newKey = baseKey;
            }
            note.keys = [`${newKey}/${octave}`];
            startPreviewSound(note.keys[0]);
            setTimeout(stopPreviewSound, 200);
            renderCurrentView();
        }

        function insertNote(tick, keys, durationChar, trackName, isTied = false) {
            const track = trackName || activeTrackName;
            const trackMap = getTrackMap(track);
            const mIdx = getMeasureIndexForTick(tick);
            const settings = getSettingsForMeasure(mIdx);
            const durTicks = DURATION_TICKS[durationChar];
            for (let t = tick; t < tick + durTicks; t++) { if (trackMap.has(t)) trackMap.delete(t); }
            for (let t = tick - 1; t >= tick - 16; t--) {
                if (trackMap.has(t)) {
                    const prevNote = trackMap.get(t);
                    const prevEnd = t + DURATION_TICKS[prevNote.duration];
                    if (prevEnd > tick) {
                        const remaining = tick - t;
                        if (remaining > 0 && TICKS_TO_DURATION[remaining]) {
                            prevNote.duration = TICKS_TO_DURATION[remaining];
                            prevNote.isTied = false;
                        } else {
                            trackMap.delete(t);
                        }
                    }
                }
            }
            const noteClef = (projectData.mode === 'quartet') ? TRACK_DEFS[track].clef : settings.clef;
            trackMap.set(tick, { keys: keys, duration: durationChar, type: 'note', clef: noteClef, isTied: isTied, isOrnament: false });
            selectedTick = tick;
            selectedTrackName = track;
        }

        function updateNotePitch(tick, newKey, trackName) {
            const track = trackName || getSelectedTrack();
            const trackMap = getTrackMap(track);
            if (!trackMap.has(tick)) return;
            const note = trackMap.get(tick);
            if (note.keys[0] !== newKey) {
                note.keys = [newKey];
                startPreviewSound(newKey);
                renderCurrentView();
            }
        }

        function deleteNoteAt(tick, trackName) {
            const track = trackName || getSelectedTrack();
            const trackMap = getTrackMap(track);
            if (trackMap.has(tick)) {
                trackMap.delete(tick);
                if (selectedTick === tick) {
                    selectedTick = null;
                    selectedTrackName = null;
                }
                renderCurrentView();
            }
        }

        function handleMouseDown(event) {
            // Branch to piano roll handler if in piano roll view
            if (currentView === 'pianoroll') {
                handlePianoRollMouseDown(event);
                return;
            }

            if (event.button !== 0) return;
            initAudio();
            const svg = document.querySelector("#output svg");
            if (!svg) return;
            const svgRect = svg.getBoundingClientRect();
            const mouseX = event.clientX - svgRect.left;
            const mouseY = event.clientY - svgRect.top;
            let detectedTrack = null;
            for (let m = 0; m < generatedStaves.length; m++) {
                const staveGroup = generatedStaves[m];
                const tracksToCheck = (projectData.mode === 'quartet')
                    ? ['soprano', 'alto', 'tenor', 'bass']
                    : ['single'];
                for (let track of tracksToCheck) {
                    const stave = staveGroup[track];
                    if (!stave) continue;
                    const yTop = stave.getYForLine(0) - 40;
                    const yBottom = stave.getYForLine(4) + 60;
                    if (mouseY >= yTop && mouseY <= yBottom) {
                        detectedTrack = (track === 'single') ? 'melody' : track;
                        break;
                    }
                }
                if (detectedTrack) break;
            }
            if (!detectedTrack) {
                selectedTick = null; selectedTrackName = null;
                renderCurrentView();
                return;
            }
            if (projectData.mode === 'quartet') setActiveTrack(detectedTrack);
            const clickedTick = getNearestTickFromX(mouseX);
            setPlaybackStartTick(clickedTick);
            let bestTarget = null;
            let minDistance = 9999;
            const HORIZONTAL_SNAP = 25;
            for (let t of clickTargets) {
                if (t.track !== detectedTrack) continue;
                if (mouseX >= t.x - HORIZONTAL_SNAP && mouseX <= t.x + t.w + HORIZONTAL_SNAP) {
                    const dist = Math.abs(mouseX - (t.x + t.w/2));
                    if (dist < minDistance) { minDistance = dist; bestTarget = t; }
                }
            }
            if (bestTarget) {
                if (bestTarget.type === 'note') {
                    setPlaybackStartTick(bestTarget.tick);
                    selectedTick = bestTarget.tick;
                    selectedTrackName = bestTarget.track;
                    draggingTick = bestTarget.tick;
                    draggingTrackName = bestTarget.track;
                    dragStartY = mouseY;
                    isDragging = false;
                    dragHasSavedState = false;
                    const trackMap = getTrackMap(bestTarget.track);
                    if (trackMap.has(bestTarget.tick)) {
                        const note = trackMap.get(bestTarget.tick);
                        startPreviewSound(note.keys[0]);
                    }
                    const mIdx = getMeasureIndexForTick(bestTarget.tick);
                    const settings = getSettingsForMeasure(mIdx);
                    document.getElementById('clef-select').value = settings.clef;
                    document.getElementById('time-sig-select').value = settings.time;
                    document.getElementById('key-sig-select').value = settings.key;
                    updateDraftSettings();
                    renderCurrentView();
                } else if (bestTarget.type === 'rest') {
                    setPlaybackStartTick(bestTarget.tick);
                    saveState();
                    const key = getNoteFromY(mouseY, bestTarget.measureIndex, detectedTrack);
                    if (key) {
                        insertNote(bestTarget.tick, [key], getEffectiveDuration(currentDuration), detectedTrack);
                        startPreviewSound(key);
                        renderCurrentView();
                    }
                }
            } else {
                selectedTick = null; selectedTrackName = null;
                renderCurrentView();
            }
        }

        function handleContextMenu(event) {
            event.preventDefault();

            // Piano Roll view: check if right-clicked on a note rect
            if (currentView === 'pianoroll') {
                const target = event.target;
                if (target.tagName === 'rect' && target.dataset.type === 'note') {
                    const tick = parseInt(target.dataset.tick);
                setPlaybackStartTick(tick);
                    const trackName = target.dataset.track;
                    saveState();
                    deleteNoteAt(tick, trackName);
                    return;
                }
                return;
            }

            // Staff view: use clickTargets
            const svg = document.querySelector("#output svg");
            if (!svg) return;
            const svgRect = svg.getBoundingClientRect();
            const mouseX = event.clientX - svgRect.left;
            const mouseY = event.clientY - svgRect.top;
            for (let t of clickTargets) {
                if (mouseX >= t.x - 20 && mouseX <= t.x + t.w + 20 && mouseY >= t.y - 20 && mouseY <= t.y + t.h + 20) {
                     if (t.type === 'note') {
                         saveState();
                         deleteNoteAt(t.tick, t.track);
                         return;
                     }
                }
            }
        }

        function handleGlobalMouseMove(event) {
            // Piano roll drag handling
            if (currentView === 'pianoroll' && pianoRollDragState.mode !== null) {
                handlePianoRollMouseMove(event);
                return;
            }

            // Staff view drag handling
            if (draggingTick === null) return;
            const svg = document.querySelector("#output svg");
            if (!svg) return;
            const svgRect = svg.getBoundingClientRect();
            const mouseY = event.clientY - svgRect.top;
            if (!isDragging && Math.abs(mouseY - dragStartY) > 5) isDragging = true;
            if (isDragging) {
                if (!dragHasSavedState) { saveState(); dragHasSavedState = true; }
                const mIdx = getMeasureIndexForTick(draggingTick);
                const key = getNoteFromY(mouseY, mIdx, draggingTrackName || getSelectedTrack());
                if (key) updateNotePitch(draggingTick, key, draggingTrackName || getSelectedTrack());
            }
        }

        function handleGlobalMouseUp(event) {
            stopPreviewSound();
            if (draggingTick !== null) {
                draggingTick = null; draggingTrackName = null; isDragging = false; dragHasSavedState = false;
            }
            // Piano roll drag cleanup
            pianoRollDragState.mode = null;
            pianoRollDragState.tick = null;
            pianoRollDragState.trackName = null;
        }

        // --- PIANO ROLL INTERACTION HANDLERS ---
        function handlePianoRollMouseDown(event) {
            if (event.button !== 0) return; // Left click only
            initAudio();

            const svg = document.querySelector("#output svg");
            if (!svg) return;

            const svgRect = svg.getBoundingClientRect();
            const mouseX = event.clientX - svgRect.left;
            const mouseY = event.clientY - svgRect.top;

            // Check if clicked on keyboard (ignore)
            if (mouseX < PIANO_ROLL_CONFIG.KEYBOARD_WIDTH) return;

            // Check if clicked on note
            const target = event.target;
            if (target.tagName === 'rect' && target.dataset.type === 'note') {
                const tick = parseInt(target.dataset.tick);
                setPlaybackStartTick(tick);
                const trackName = target.dataset.track;

                // Select note
                selectedTick = tick;
                selectedTrackName = trackName;

                // Check if near right edge (resize mode)
                const rectBounds = target.getBoundingClientRect();
                const relativeX = event.clientX - rectBounds.left;
                const isResizeArea = relativeX > rectBounds.width - 10;

                if (isResizeArea) {
                    // Start resize drag
                    pianoRollDragState.mode = 'resize';
                    pianoRollDragState.tick = tick;
                    pianoRollDragState.trackName = trackName;
                    pianoRollDragState.startX = mouseX;
                    pianoRollDragState.originalTick = tick;
                } else {
                    // Start move drag
                    pianoRollDragState.mode = 'move';
                    pianoRollDragState.tick = tick;
                    pianoRollDragState.trackName = trackName;
                    pianoRollDragState.startX = mouseX;
                    pianoRollDragState.startY = mouseY;
                    pianoRollDragState.originalTick = tick;

                    const trackMap = getTrackMap(trackName);
                    const note = trackMap.get(tick);
                    pianoRollDragState.originalKey = note.keys[0];

                    // Preview sound
                    startPreviewSound(note.keys[0]);
                }

                saveState();
                renderCurrentView();
                return;
            }

            // Clicked on empty grid - create note
            const tick = getPianoRollTickFromX(mouseX);
            setPlaybackStartTick(tick);
            const key = getPianoRollNoteFromY(mouseY);

            if (tick !== null && key !== null) {
                saveState();
                const track = getSelectedTrack();
                insertNote(tick, [key], getEffectiveDuration(currentDuration), track);
                selectedTick = tick;
                selectedTrackName = track;
                startPreviewSound(key);
                renderCurrentView();
            }
        }

        function handlePianoRollMouseMove(event) {
            if (pianoRollDragState.mode === null) return;

            const svg = document.querySelector("#output svg");
            if (!svg) return;

            const svgRect = svg.getBoundingClientRect();
            const mouseX = event.clientX - svgRect.left;
            const mouseY = event.clientY - svgRect.top;

            if (pianoRollDragState.mode === 'move') {
                // Vertical drag (pitch change)
                const newKey = getPianoRollNoteFromY(mouseY);
                if (newKey && newKey !== pianoRollDragState.originalKey) {
                    updateNotePitch(pianoRollDragState.tick, newKey, pianoRollDragState.trackName);
                    pianoRollDragState.originalKey = newKey;
                }
            } else if (pianoRollDragState.mode === 'resize') {
                // Calculate new duration based on mouseX
                const trackMap = getTrackMap(pianoRollDragState.trackName);
                const note = trackMap.get(pianoRollDragState.tick);
                if (!note) return;

                const newEndTick = getPianoRollTickFromX(mouseX);

                if (newEndTick > pianoRollDragState.tick) {
                    const newDurationTicksRaw = newEndTick - pianoRollDragState.tick;
                    const newDurationTicks = snapDurationTicks(newDurationTicksRaw);
                    const newDuration = TICKS_TO_DURATION[newDurationTicks];

                    if (newDuration && newDuration !== note.duration) {
                        note.duration = newDuration;
                        renderCurrentView();
                    }
                }
            }
        }

        function handleKeyDown(e) {
            if (e.target.tagName === 'INPUT') return;
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); return; }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
            if (selectedTick === null) return;
            if (["ArrowUp", "ArrowDown", " "].indexOf(e.code) > -1) e.preventDefault();
            if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
            if (e.key === 'Escape') {
                selectedTick = null; selectedTrackName = null;
                renderCurrentView();
            }
            if (e.key === 'ArrowUp') shiftPitchChromatic(1);
            if (e.key === 'ArrowDown') shiftPitchChromatic(-1);
            if (e.key.toLowerCase() === 't') toggleTie();
        }

        function shiftPitchChromatic(direction) {
            if (selectedTick === null) return;
            const map = getTrackMap(getSelectedTrack());
            if (!map.has(selectedTick)) return;
            saveState();
            const note = map.get(selectedTick);
            const [key, octaveStr] = note.keys[0].split('/');
            let octave = parseInt(octaveStr);
            const chromaticScale = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];
            let cleanKey = key.toLowerCase();
            const flatToSharp = { 'db': 'c#', 'eb': 'd#', 'gb': 'f#', 'ab': 'g#', 'bb': 'a#' };
            if (flatToSharp[cleanKey]) cleanKey = flatToSharp[cleanKey];
            if (cleanKey === 'cb') { cleanKey = 'b'; octave--; }
            if (cleanKey === 'fb') cleanKey = 'e';
            if (cleanKey === 'b#') { cleanKey = 'c'; octave++; }
            if (cleanKey === 'e#') cleanKey = 'f';
            cleanKey = cleanKey.replace('n', '');
            let index = chromaticScale.indexOf(cleanKey);
            if (index === -1) return;
            let newIndex = index + direction;
            if (newIndex > 11) { newIndex = 0; octave++; }
            if (newIndex < 0) { newIndex = 11; octave--; }
            note.keys = [`${chromaticScale[newIndex]}/${octave}`];
            startPreviewSound(note.keys[0]);
            setTimeout(stopPreviewSound, 200);
            renderCurrentView();
        }

        function decomposeTicks(totalTicks) {
            let remaining = totalTicks;
            let result = [];
            const values = [24, 16, 12, 8, 6, 4, 3, 2, 1];
            for (let val of values) {
                while (remaining >= val) { result.push(TICKS_TO_DURATION[val]); remaining -= val; }
            }
            return result;
        }

        function getNoteFromY(mouseY, measureIndex, trackName) {
            if (generatedStaves.length === 0) return null;
            const settings = getSettingsForMeasure(measureIndex);
            const clef = getClefForTrack(trackName, measureIndex);
            const measureStaves = generatedStaves[measureIndex] || generatedStaves[0];
            let refStave = (projectData.mode === 'single') ? measureStaves.single : measureStaves[trackName];
            if (!refStave) return null;
            const yTop = refStave.getYForLine(0);
            const lineValue = (mouseY - yTop) / 10;
            const roundedLine = Math.round(lineValue * 2) / 2;
            const baseIndex = clef === 'bass' ? 21 : 33;
            const naturalNotes = [
                { k: 'a', o: 0 }, { k: 'b', o: 0 }, { k: 'c', o: 1 }, { k: 'd', o: 1 }, { k: 'e', o: 1 }, { k: 'f', o: 1 }, { k: 'g', o: 1 }, { k: 'a', o: 1 }, { k: 'b', o: 1 },
                { k: 'c', o: 2 }, { k: 'd', o: 2 }, { k: 'e', o: 2 }, { k: 'f', o: 2 }, { k: 'g', o: 2 }, { k: 'a', o: 2 }, { k: 'b', o: 2 },
                { k: 'c', o: 3 }, { k: 'd', o: 3 }, { k: 'e', o: 3 }, { k: 'f', o: 3 }, { k: 'g', o: 3 }, { k: 'a', o: 3 }, { k: 'b', o: 3 },
                { k: 'c', o: 4 }, { k: 'd', o: 4 }, { k: 'e', o: 4 }, { k: 'f', o: 4 }, { k: 'g', o: 4 }, { k: 'a', o: 4 }, { k: 'b', o: 4 },
                { k: 'c', o: 5 }, { k: 'd', o: 5 }, { k: 'e', o: 5 }, { k: 'f', o: 5 }, { k: 'g', o: 5 }, { k: 'a', o: 5 }, { k: 'b', o: 5 },
                { k: 'c', o: 6 }, { k: 'd', o: 6 }, { k: 'e', o: 6 }, { k: 'f', o: 6 }, { k: 'g', o: 6 }, { k: 'a', o: 6 }, { k: 'b', o: 6 }
            ];
            const targetIndex = Math.round(baseIndex - (roundedLine * 2));
            if (targetIndex < 0 || targetIndex >= naturalNotes.length) return null;
            const rawNote = naturalNotes[targetIndex];
            const alteration = keySignatures[settings.key][rawNote.k];
            let finalKey = rawNote.k;
            if (alteration) finalKey += alteration;
            return `${finalKey}/${rawNote.o}`;
        }

        // --- PIANO ROLL HELPER FUNCTIONS ---
        function midiFromKey(noteKey) {
            if (!noteKey) return null;
            const chromatic = { 'c': 0, 'cn': 0, 'c#': 1, 'db': 1, 'd': 2, 'dn': 2, 'd#': 3, 'eb': 3, 'e': 4, 'en': 4, 'fb': 4, 'e#': 5, 'f': 5, 'fn': 5, 'f#': 6, 'gb': 6, 'g': 7, 'gn': 7, 'g#': 8, 'ab': 8, 'a': 9, 'an': 9, 'a#': 10, 'bb': 10, 'b': 11, 'bn': 11, 'b#': 0, 'cb': 11, 'c##': 2, 'd##': 4, 'e##': 6, 'f##': 7, 'g##': 9, 'a##': 11, 'b##': 1, 'cbb': 10, 'dbb': 0, 'ebb': 2, 'fbb': 3, 'gbb': 5, 'abb': 7, 'bbb': 9 };
            const parts = String(noteKey).split('/');
            if (parts.length !== 2) return null;
            let key = parts[0].toLowerCase();
            let octave = parseInt(parts[1]);
            if (Number.isNaN(octave)) return null;

            // Normalize enharmonics that shift octave
            if (key === 'cb') octave -= 1;
            if (key === 'b#') octave += 1;
            if (key === 'cbb') octave -= 1;
            if (key === 'b##') octave += 1;

            key = key.replace('n', '');
            const semi = chromatic[key];
            if (semi === undefined) return null;

            // MIDI: C4 = 60 => (octave + 1) * 12 + semitone
            return (octave + 1) * 12 + semi;
        }

        function keyFromMidi(midi) {
            if (midi === null || midi === undefined) return null;
            const m = Math.round(midi);
            const octave = Math.floor(m / 12) - 1;
            const semitone = ((m % 12) + 12) % 12;
            const noteName = SEMITONE_NAMES[semitone];
            return `${noteName.toLowerCase()}/${octave}`;
        }

        function keyToSemitoneIndex(key) {
            const midi = midiFromKey(key);
            if (midi === null) return null;
            if (midi < PIANO_ROLL_CONFIG.MIN_MIDI || midi > PIANO_ROLL_CONFIG.MAX_MIDI) return null;
            return midi - PIANO_ROLL_CONFIG.MIN_MIDI;
        }

        function semitoneIndexToKey(index) {
            if (index < 0 || index >= PIANO_ROLL_CONFIG.SEMITONES) return null;
            return keyFromMidi(PIANO_ROLL_CONFIG.MIN_MIDI + index);
        }

        function isBlackKeyMidi(midi) {
            const inOctave = midi % 12;
            return [1, 3, 6, 8, 10].includes(inOctave); // C#, D#, F#, G#, A#
        }

        function getPianoRollNoteFromY(mouseY) {
            const rowIndex = Math.floor(mouseY / PIANO_ROLL_CONFIG.ROW_HEIGHT);
            const relIndex = PIANO_ROLL_CONFIG.SEMITONES - 1 - rowIndex;
            if (relIndex < 0 || relIndex >= PIANO_ROLL_CONFIG.SEMITONES) return null;
            return semitoneIndexToKey(relIndex);
        }

        function getPianoRollTickFromX(mouseX) {
            const adjustedX = mouseX - PIANO_ROLL_CONFIG.KEYBOARD_WIDTH;
            
            // Use linear calculation - simple and uniform
            const tick = getTickFromLinearX(adjustedX);
            
            // Clamp to valid range
            const totalTicks = getTotalTicks();
            return Math.max(0, Math.min(tick, totalTicks - 1));
        }

        // --- CIPHER FUNCTIONS ---
        function setCipher(measureIndex, localTick, text) {
            if (!cipherData[measureIndex]) cipherData[measureIndex] = {};
            cipherData[measureIndex][localTick] = text;
        }

        function getCipher(measureIndex, localTick) {
            return cipherData[measureIndex]?.[localTick] || '';
        }

        function clearCipherForMeasure(measureIndex) {
            delete cipherData[measureIndex];
        }

        function toggleCiphers() {
            cipherVisible = !cipherVisible;
            const btn = document.getElementById('btn-toggle-ciphers');
            if (cipherVisible) {
                btn.textContent = 'Hide Chords';
                btn.classList.remove('bg-slate-800', 'border-slate-600');
                btn.classList.add('bg-emerald-800', 'border-emerald-600');
                renderCipherInputs();
            } else {
                btn.textContent = 'Show Chords';
                btn.classList.remove('bg-emerald-800', 'border-emerald-600');
                btn.classList.add('bg-slate-800', 'border-slate-600');
                document.getElementById('cipher-overlay').innerHTML = '';
            }
        }

        function renderCipherInputs() {
            if (!cipherVisible) {
                document.getElementById('cipher-overlay').innerHTML = '';
                return;
            }

            const overlay = document.getElementById('cipher-overlay');
            overlay.innerHTML = '';

            // Get the offset of #output (SVG container) within #canvas-container
            const container = document.getElementById('canvas-container');
            const outputDiv = document.getElementById('output');
            if (!container || !outputDiv) return;

            const containerRect = container.getBoundingClientRect();
            const outputRect = outputDiv.getBoundingClientRect();

            // Calculate offset: how far #output is from the left/top edge of #canvas-container
            const offsetX = outputRect.left - containerRect.left + container.scrollLeft;
            const offsetY = outputRect.top - containerRect.top + container.scrollTop;

            // Fixed cipher grid: 4 inputs per measure at quarter-note beats (4/4 => ticks 0,4,8,12)
            const viewXOffset = (currentView === 'pianoroll') ? PIANO_ROLL_CONFIG.KEYBOARD_WIDTH : 0;

            // Y position: below staves (staff view) or below the piano roll grid (piano roll view)
            let yPos;
            if (currentView === 'pianoroll') {
                yPos = offsetY + (PIANO_ROLL_CONFIG.SEMITONES * PIANO_ROLL_CONFIG.ROW_HEIGHT) + 24;
            } else {
                if (projectData.mode === 'quartet') {
                    yPos = offsetY + STAVE_Y_START + (QUARTET_STAFF_GAP * 4) + 40;
                } else {
                    yPos = offsetY + STAVE_Y_START + 130;
                }
            }

            let accumulatedTicks = 0;
            for (let m = 0; m < totalMeasures; m++) {
                const settings = getSettingsForMeasure(m);
                const measureTicks = getTicksForTimeSig(settings.time);

                // Quarter positions (beats 1-4). Only include those inside the current time signature length.
                const quarterPositions = [0, 1, 2, 3].map(b => b * TICKS_PER_QUARTER).filter(t => t < measureTicks);

                quarterPositions.forEach((localTick) => {
                    const absTick = accumulatedTicks + localTick;
                    // Use linear position for piano roll, VexFlow position for staff
                    const tickX = (currentView === 'pianoroll') ? getLinearXForTick(absTick) : getXForTick(absTick);
                    const xPos = offsetX + viewXOffset + tickX;

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'cipher-input';
                    input.dataset.measure = m;
                    input.dataset.localTick = localTick;
                    input.value = getCipher(m, localTick) || '';

                    // center 70px input on beat position
                    input.style.left = `${xPos - 35}px`;
                    input.style.top = `${yPos}px`;

                    input.addEventListener('input', (e) => {
                        setCipher(
                            parseInt(e.target.dataset.measure),
                            parseInt(e.target.dataset.localTick),
                            e.target.value
                        );
                    });

                    overlay.appendChild(input);
                });

                accumulatedTicks += measureTicks;
            }
        }

        function renderCurrentView() {
            if (currentView === 'staff') {
                renderScore();
            } else if (currentView === 'pianoroll') {
                renderPianoRoll();
            }
        }

        function renderPianoRoll() {
            const div = document.getElementById("output");

            // Remove playback cursor temporarily
            let cursor = document.getElementById('playback-cursor');
            if (cursor && cursor.parentNode) {
                cursor.parentNode.removeChild(cursor);
            }

            // Clear container
            div.innerHTML = "";

            // No need to render staff first - piano roll uses linear positioning
            sanitizeNotesToPianoRollRange();

            // Calculate dimensions using linear tick positions
            const totalTicks = getTotalTicks();
            const totalHeight = PIANO_ROLL_CONFIG.SEMITONES * PIANO_ROLL_CONFIG.ROW_HEIGHT;
            const totalWidth = PIANO_ROLL_CONFIG.KEYBOARD_WIDTH + getLinearXForTick(totalTicks) + 100;

            // Create SVG
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", totalWidth);
            svg.setAttribute("height", totalHeight + 100);
            svg.style.display = "block";

            // Dark background
            const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bg.setAttribute("width", totalWidth);
            bg.setAttribute("height", totalHeight + 100);
            bg.setAttribute("fill", "#f8fafc");
            svg.appendChild(bg);

            // Render components
            renderPianoRollGrid(svg);
            renderPianoKeyboard(svg);
            renderPianoRollNotes(svg);

            // Add to DOM
            div.appendChild(svg);

            // Attach event listeners
            svg.addEventListener('mousedown', handleMouseDown);

            // Re-add playback cursor
            if (cursor) {
                cursor.style.height = totalHeight + "px";
                div.appendChild(cursor);
            }

            setTimeout(() => renderCipherInputs(), 0);
        }

        function renderScore() {
            if (typeof Vex === 'undefined') return;
            projectData.mode === 'quartet' ? renderQuartet() : renderSingle();
        }

        function renderSingle() {
            const VF = Vex.Flow;
            const div = document.getElementById("output");
            let cursor = document.getElementById('playback-cursor');
            if (cursor && cursor.parentNode) {
                cursor.parentNode.removeChild(cursor);
            }
            div.innerHTML = "";
            clickTargets = []; generatedStaves = []; tickXPositions = [];
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            renderer.resize(100, SINGLE_RENDER_HEIGHT);
            const context = renderer.getContext();
            let currentX = 10;
            let currentAbsTick = 0;
            let pendingSplitNote = null;
            let allRenderedNotes = [];
            const scoreNotes = getTrackMap('melody');
            for (let m = 0; m < totalMeasures; m++) {
                const settings = getSettingsForMeasure(m);
                const measureTicks = getTicksForTimeSig(settings.time);
                let currentMeasureContent = [];
                let currentMeasureTicksUsed = 0;
                while (currentMeasureTicksUsed < measureTicks) {
                    let atom = null;
                    if (pendingSplitNote) {
                        atom = { ...pendingSplitNote }; pendingSplitNote = null;
                    } else if (scoreNotes.has(currentAbsTick)) {
                        const n = scoreNotes.get(currentAbsTick);
                        atom = { keys: n.keys, durationTicks: DURATION_TICKS[n.duration], type: 'note', clef: settings.clef, isTied: n.isTied, sourceTick: currentAbsTick, text: n.text, isOrnament: n.isOrnament };
                    } else {
                        let distToNext = measureTicks - currentMeasureTicksUsed;
                        for (let t = currentAbsTick + 1; t < currentAbsTick + distToNext; t++) {
                            if (scoreNotes.has(t)) { distToNext = t - currentAbsTick; break; }
                        }
                        let fillTicks = 1;
                        if (distToNext >= 16) fillTicks = 16; else if (distToNext >= 8) fillTicks = 8; else if (distToNext >= 4) fillTicks = 4; else if (distToNext >= 2) fillTicks = 2;
                        atom = { keys: [settings.clef === 'bass' ? 'd/3' : 'b/4'], durationTicks: fillTicks, type: 'rest', clef: settings.clef, sourceTick: currentAbsTick };
                    }
                    const space = measureTicks - currentMeasureTicksUsed;
                    const ticksToWrite = Math.min(atom.durationTicks, space);
                    const components = decomposeTicks(ticksToWrite);
                    components.forEach((durChar, idx) => {
                        const compTicks = DURATION_TICKS[durChar];
                        let shouldTie = false;
                        if (atom.type === 'note') {
                            if (idx < components.length - 1) shouldTie = true;
                            else if (atom.durationTicks > space) shouldTie = true;
                            else shouldTie = atom.isTied;
                        }
                        const vexDur = toVexDuration(durChar);
                        const vfNote = new VF.StaveNote({
                            keys: atom.keys, duration: vexDur + (atom.type === 'rest' ? 'r' : ''), clef: settings.clef, auto_stem: true
                        });
                        if (String(durChar).endsWith('.')) { try { vfNote.addDotToAll(); } catch (e) {} }
                        if (atom.type === 'rest') {
                            vfNote.setStyle({ fillStyle: "#94a3b8" });
                        } else {
                            vfNote.setStyle({ fillStyle: "#1e293b", strokeStyle: "#1e293b" });
                        }
                        if (atom.type === 'note') {
                            if (atom.isOrnament) {
                                vfNote.setStyle({ fillStyle: "#ef4444", strokeStyle: "#ef4444" });
                            }
                            if (selectedTick === atom.sourceTick) {
                                vfNote.setStyle({ fillStyle: "#2563eb", strokeStyle: "#2563eb" });
                            }
                        }
                        const item = { vfNote, tick: currentAbsTick, type: atom.type, duration: durChar, isTied: shouldTie, measureIndex: m, sourceTick: atom.sourceTick, track: 'melody', staffClef: settings.clef };
                        currentMeasureContent.push(item);
                        allRenderedNotes.push(item);
                        currentAbsTick += compTicks;
                        currentMeasureTicksUsed += compTicks;
                    });
                    if (atom.durationTicks > space) {
                        pendingSplitNote = { keys: atom.keys, durationTicks: atom.durationTicks - space, type: atom.type, clef: settings.clef, isTied: atom.isTied, isTiedFromPrev: true, sourceTick: atom.sourceTick, isOrnament: atom.isOrnament };
                    }
                }
                const vfNotes = currentMeasureContent.map(n => n.vfNote);
                const [num, den] = settings.time.split('/').map(Number);
                const voice = new VF.Voice({ num_beats: num, beat_value: den }).setStrict(false).addTickables(vfNotes);
                VF.Accidental.applyAccidentals([voice], settings.key);
                const beams = VF.Beam.generateBeams(vfNotes);
                const formatter = new VF.Formatter().joinVoices([voice]);
                const minWidth = formatter.preCalculateMinTotalWidth([voice]);
                const padding = (m === 0) ? 120 : 30;
                const staveWidth = Math.max(MIN_STAVE_WIDTH, minWidth + padding + 80);
                const stave = new VF.Stave(currentX, STAVE_Y_START, staveWidth);
                if (m === 0) stave.addClef(settings.clef).addTimeSignature(settings.time).addKeySignature(settings.key);
                else {
                    const prev = getSettingsForMeasure(m - 1);
                    if (settings.clef !== prev.clef) stave.addClef(settings.clef);
                    if (settings.key !== prev.key) { stave.addKeySignature(settings.key); stave.setBegBarType(VF.Barline.type.SINGLE); }
                    if (settings.time !== prev.time) stave.addTimeSignature(settings.time);
                }
                stave.setContext(context).draw();
                generatedStaves.push({ single: stave });
                const availWidth = staveWidth - (stave.getNoteStartX() - stave.getX()) - 20;
                formatter.format([voice], availWidth);
                voice.draw(context, stave);
                beams.forEach(b => b.setContext(context).draw());
                currentMeasureContent.forEach((item) => {
                    try {
                        if (!item.vfNote.getTickContext()) return;
                        const bb = item.vfNote.getBoundingBox();
                        if (bb) clickTargets.push({ x: bb.getX(), y: bb.getY(), w: bb.getW(), h: bb.getH(), tick: item.sourceTick, type: item.type, duration: item.duration, measureIndex: m, track: 'melody', staffClef: settings.clef });
                        tickXPositions.push({ tick: item.tick, x: item.vfNote.getAbsoluteX() });
                    } catch (e) {}
                });
                currentX += staveWidth;
            }
            allRenderedNotes.forEach((note, i) => {
                try {
                    if (note.isTied) {
                         let next = null;
                         for (let j = i + 1; j < allRenderedNotes.length; j++) {
                             if (allRenderedNotes[j].type === 'note') { next = allRenderedNotes[j]; break; }
                         }
                         if (next && note.vfNote.getTickContext() && next.vfNote.getTickContext()) {
                             new VF.StaveTie({ first_note: note.vfNote, last_note: next.vfNote }).setContext(context).draw();
                         }
                    }
                } catch (e) { /* Silently ignore tie drawing errors */ }
            });
            renderer.resize(currentX + 20, SINGLE_RENDER_HEIGHT);
            tickXPositions = compressTickPositions(tickXPositions.sort((a,b)=>a.tick-b.tick));
            const svgElement = div.querySelector('svg');
            if(svgElement) {
                svgElement.addEventListener('mousedown', handleMouseDown);
                if (cursor) div.appendChild(cursor);
            }
            setTimeout(() => renderCipherInputs(), 0);
        }

        function renderQuartet() {
            const VF = Vex.Flow;
            const div = document.getElementById("output");
            let cursor = document.getElementById('playback-cursor');
            if (cursor && cursor.parentNode) {
                cursor.parentNode.removeChild(cursor);
            }
            div.innerHTML = "";
            clickTargets = []; generatedStaves = []; tickXPositions = [];
            const renderer = new VF.Renderer(div, VF.Renderer.Backends.SVG);
            renderer.resize(100, QUARTET_RENDER_HEIGHT);
            const context = renderer.getContext();
            const measureStarts = []; let acc = 0;
            for (let m = 0; m < totalMeasures; m++) { measureStarts[m] = acc; acc += getTicksForTimeSig(getSettingsForMeasure(m).time); }
            const pendingSplit = { soprano: null, alto: null, tenor: null, bass: null };
            const renderedByTrack = { soprano: [], alto: [], tenor: [], bass: [] };
            let currentX = 10;
            for (let m = 0; m < totalMeasures; m++) {
                const settings = getSettingsForMeasure(m);
                const measureTicks = getTicksForTimeSig(settings.time);
                const [num, den] = settings.time.split('/').map(Number);
                const mStart = measureStarts[m];
                const build = (tr, clef) => buildMeasureContent(tr, getTrackMap(tr), m, mStart, measureTicks, settings, clef, pendingSplit, renderedByTrack);
                const sopItems = build('soprano', 'treble');
                const altoItems = build('alto', 'treble');
                const tenItems = build('tenor', 'bass');
                const bassItems = build('bass', 'bass');
                const vS = new VF.Voice({num_beats: num, beat_value: den}).setStrict(false).addTickables(sopItems.map(i=>i.vfNote));
                const vA = new VF.Voice({num_beats: num, beat_value: den}).setStrict(false).addTickables(altoItems.map(i=>i.vfNote));
                const vT = new VF.Voice({num_beats: num, beat_value: den}).setStrict(false).addTickables(tenItems.map(i=>i.vfNote));
                const vB = new VF.Voice({num_beats: num, beat_value: den}).setStrict(false).addTickables(bassItems.map(i=>i.vfNote));
                VF.Accidental.applyAccidentals([vS,vA,vT,vB], settings.key);
                let measureBeams = [];
                [sopItems, altoItems, tenItems, bassItems].forEach(arr => {
                    const notes = arr.map(i=>i.vfNote);
                    if(notes.length) {
                        const beams = VF.Beam.generateBeams(notes);
                        measureBeams.push(...beams);
                    }
                });
                // Calculate minimum width first with a temporary formatter
                const tempFormatter = new VF.Formatter();
                const minWidth = tempFormatter.preCalculateMinTotalWidth([vS,vA,vT,vB]);
                const width = Math.max(MIN_STAVE_WIDTH, minWidth + (m===0?180:30) + 80);
                
                const yS = STAVE_Y_START, yA = yS + QUARTET_STAFF_GAP, yT = yA + QUARTET_STAFF_GAP, yB = yT + QUARTET_STAFF_GAP;
                const ss = new VF.Stave(currentX, yS, width);
                const sa = new VF.Stave(currentX, yA, width);
                const st = new VF.Stave(currentX, yT, width);
                const sb = new VF.Stave(currentX, yB, width);
                if (m === 0) {
                     [ss,sa].forEach(s=>s.addClef('treble').addTimeSignature(settings.time).addKeySignature(settings.key));
                     [st,sb].forEach(s=>s.addClef('bass').addTimeSignature(settings.time).addKeySignature(settings.key));
                     new VF.StaveConnector(ss, sb).setType(VF.StaveConnector.type.BRACKET).setContext(context).draw();
                     new VF.StaveConnector(ss, sb).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(context).draw();
                } else {
                     const prev = getSettingsForMeasure(m-1);
                     if (settings.key !== prev.key) { [ss,sa,st,sb].forEach(s=>{s.addKeySignature(settings.key); s.setBegBarType(VF.Barline.type.SINGLE);}); }
                     if (settings.time !== prev.time) [ss,sa,st,sb].forEach(s=>s.addTimeSignature(settings.time));
                }
                new VF.StaveConnector(ss, sb).setType(VF.StaveConnector.type.SINGLE_RIGHT).setContext(context).draw();
                const startX = Math.max(ss.getNoteStartX(), sa.getNoteStartX(), st.getNoteStartX(), sb.getNoteStartX());
                [ss,sa,st,sb].forEach(s=>{ s.setNoteStartX(startX); s.setContext(context).draw(); });
                generatedStaves.push({ soprano: ss, alto: sa, tenor: st, bass: sb });
                
                // FIX: Use formatToStave which properly aligns all voices to the same reference stave
                const formatter = new VF.Formatter();
                formatter.formatToStave([vS, vA, vT, vB], ss, { align_rests: false });
                
                vS.draw(context, ss);
                vA.draw(context, sa);
                vT.draw(context, st);
                vB.draw(context, sb);
                measureBeams.forEach(b => b.setContext(context).draw());
                [sopItems, altoItems, tenItems, bassItems].forEach(items => {
                    items.forEach(i => {
                        try {
                            if (!i.vfNote.getTickContext()) return;
                            const bb = i.vfNote.getBoundingBox();
                            clickTargets.push({x:bb.getX(), y:bb.getY(), w:bb.getW(), h:bb.getH(), tick: i.sourceTick, type: i.type, duration: i.duration, measureIndex: m, track: i.track, staffClef: i.staffClef});
                            tickXPositions.push({tick: i.tick, x: i.vfNote.getAbsoluteX()});
                        } catch(e){}
                    });
                });
                currentX += width;
            }
            Object.values(renderedByTrack).forEach(items => {
                items.forEach((note, i) => {
                    try {
                        if (note.isTied) {
                            let next = null;
                            for (let j = i + 1; j < items.length; j++) { if (items[j].type === 'note') { next = items[j]; break; } }
                            if (next && note.vfNote.getTickContext() && next.vfNote.getTickContext()) {
                                new VF.StaveTie({ first_note: note.vfNote, last_note: next.vfNote }).setContext(context).draw();
                            }
                        }
                    } catch (e) { /* Silently ignore tie drawing errors */ }
                });
            });
            renderer.resize(currentX + 20, QUARTET_RENDER_HEIGHT);
            tickXPositions = compressTickPositions(tickXPositions.sort((a,b)=>a.tick-b.tick));
            const svgElement = div.querySelector('svg');
            if(svgElement) {
                svgElement.addEventListener('mousedown', handleMouseDown);
                if (cursor) div.appendChild(cursor);
            }
            setTimeout(() => renderCipherInputs(), 0);
        }

        function buildMeasureContent(track, map, mIdx, startTick, len, settings, clef, pending, rendered) {
            const VF = Vex.Flow;
            let used = 0; let absTick = startTick;
            const res = [];
            while(used < len) {
                let atom = null;
                if(pending[track]) { atom = {...pending[track]}; pending[track]=null; }
                else if(map.has(absTick)) {
                    const n = map.get(absTick);
                    atom = { keys: n.keys, durationTicks: DURATION_TICKS[n.duration], type: 'note', clef: clef, isTied: n.isTied, sourceTick: absTick, text: n.text, isOrnament: n.isOrnament };
                } else {
                     let dist = len - used;
                     for(let t=absTick+1; t<absTick+dist; t++) if(map.has(t)) { dist = t-absTick; break; }
                     let fill = 1;
                     if (dist>=16) fill=16; else if(dist>=8) fill=8; else if(dist>=4) fill=4; else if(dist>=2) fill=2;
                     atom = { keys: [clef==='bass'?'d/3':'b/4'], durationTicks: fill, type: 'rest', clef: clef, sourceTick: absTick };
                }
                const space = len - used;
                const write = (ticks, forceTie) => {
                    decomposeTicks(ticks).forEach((durChar, idx, arr) => {
                        const compTicks = DURATION_TICKS[durChar];
                        let tie = false;
                        if(atom.type==='note') { if(forceTie || idx<arr.length-1) tie=true; else tie=atom.isTied; }
                        const stem = getStemDirectionForTrack(track);
                        const vexDur = toVexDuration(durChar);
                        const vfNote = new VF.StaveNote({ keys: atom.keys, duration: vexDur + (atom.type==='rest'?'r':''), clef: clef, auto_stem: stem===null, stem_direction: stem });
                        if (String(durChar).endsWith('.')) { try { vfNote.addDotToAll(); } catch (e) {} }
                        if(atom.type==='rest') {
                            vfNote.setStyle({ fillStyle: "#94a3b8" });
                        } else {
                            vfNote.setStyle({ fillStyle: "#1e293b", strokeStyle: "#1e293b" });
                        }
                        if(atom.type==='note') {
                            if(atom.isOrnament) {
                                vfNote.setStyle({ fillStyle: "#ef4444", strokeStyle: "#ef4444" });
                            }
                            if(selectedTick===atom.sourceTick && selectedTrackName===track) {
                                vfNote.setStyle({ fillStyle: "#f97316", strokeStyle: "#f97316" });
                            }
                        }
                        const item = { vfNote, tick: absTick, type: atom.type, duration: durChar, isTied: tie, measureIndex: mIdx, sourceTick: atom.sourceTick, track: track, staffClef: clef };
                        res.push(item); rendered[track].push(item);
                        absTick += compTicks; used += compTicks;
                    });
                };
                if (atom.durationTicks <= space) write(atom.durationTicks, false);
                else {
                    const rem = atom.durationTicks - space;
                    write(space, true);
                    pending[track] = { keys: atom.keys, durationTicks: rem, type: atom.type, clef: clef, isTied: atom.isTied, isTiedFromPrev: true, sourceTick: atom.sourceTick, isOrnament: atom.isOrnament };
                }
            }
            return res;
        }

        function compressTickPositions(arr) {
            if (!arr.length) return arr;
            const out = []; let lastTick = null; let bestX = null;
            for (const p of arr) {
                if (lastTick === null || p.tick !== lastTick) {
                    if (lastTick !== null) out.push({ tick: lastTick, x: bestX });
                    lastTick = p.tick; bestX = p.x;
                } else { if (p.x < bestX) bestX = p.x; }
            }
            out.push({ tick: lastTick, x: bestX });
            return out;
        }

        function getFrequency(noteKey) {
            const chromatic = { 'c': 0, 'cn': 0, 'c#': 1, 'db': 1, 'd': 2, 'dn': 2, 'd#': 3, 'eb': 3, 'e': 4, 'en': 4, 'fb': 4, 'e#': 5, 'f': 5, 'fn': 5, 'f#': 6, 'gb': 6, 'g': 7, 'gn': 7, 'g#': 8, 'ab': 8, 'a': 9, 'an': 9, 'a#': 10, 'bb': 10, 'b': 11, 'bn': 11, 'b#': 0, 'cb': 11, 'c##': 2, 'd##': 4, 'e##': 6, 'f##': 7, 'g##': 9, 'a##': 11, 'b##': 1, 'cbb': 10, 'dbb': 0, 'ebb': 2, 'fbb': 3, 'gbb': 5, 'abb': 7, 'bbb': 9 };
            const [key, octaveStr] = noteKey.split('/');
            let octave = parseInt(octaveStr);
            const lowerKey = key.toLowerCase();
            if (lowerKey === 'cb') octave -= 1;
            if (lowerKey === 'b#') octave += 1;
            if (lowerKey === 'cbb') octave -= 1;
            if (lowerKey === 'b##') octave += 1;
            if (chromatic[lowerKey] === undefined) return null;
            const semi = chromatic[lowerKey];
            const semitones = semi + (octave - 4) * 12;
            return BASE_FREQ_C4 * Math.pow(2, semitones / 12);
        }
        function getXForTick(targetTick) {
            if (tickXPositions.length === 0) return 0;
            for (let i = 0; i < tickXPositions.length - 1; i++) {
                const p1 = tickXPositions[i]; const p2 = tickXPositions[i + 1];
                if (targetTick >= p1.tick && targetTick <= p2.tick) {
                    const range = p2.tick - p1.tick;
                    if (range === 0) return p1.x;
                    return p1.x + (p2.x - p1.x) * ((targetTick - p1.tick) / range);
                }
            }
            const last = tickXPositions[tickXPositions.length - 1];
            return targetTick > last.tick ? last.x + (targetTick - last.tick) * 10 : tickXPositions[0].x;
        }

        // Linear X position for piano roll - uniform spacing regardless of note content
        function getLinearXForTick(targetTick) {
            return targetTick * PIANO_ROLL_CONFIG.PIXELS_PER_TICK;
        }

        // Get tick from X position in piano roll (inverse of getLinearXForTick)
        function getTickFromLinearX(x) {
            return Math.round(x / PIANO_ROLL_CONFIG.PIXELS_PER_TICK);
        }

        function getTotalTicks() {
            let totalTicks = 0;
            for (let m = 0; m < totalMeasures; m++) {
                totalTicks += getTicksForTimeSig(getSettingsForMeasure(m).time);
            }
            return totalTicks;
        }

        function getNearestTickFromX(mouseX) {
            if (!tickXPositions.length) return 0;
            let best = tickXPositions[0];
            let bestDist = Math.abs(best.x - mouseX);
            for (const p of tickXPositions) {
                const d = Math.abs(p.x - mouseX);
                if (d < bestDist) { best = p; bestDist = d; }
            }
            return Math.round(best.tick);
        }

        function setPlaybackStartTick(tick) {
            const total = getTotalTicks();
            const clamped = Math.max(0, Math.min(Math.round(tick || 0), Math.max(0, total - 1)));
            playbackStartTick = clamped;

            const cursor = document.getElementById('playback-cursor');
            const container = document.getElementById('canvas-container');
            if (!cursor || !container) return;

            cursor.style.display = 'block';
            // Use linear position for piano roll, VexFlow position for staff
            const xPos = (currentView === 'pianoroll') ? getLinearXForTick(clamped) : getXForTick(clamped);
            const displayXPos = (currentView === 'pianoroll') ? xPos + PIANO_ROLL_CONFIG.KEYBOARD_WIDTH : xPos;
            cursor.style.left = displayXPos + 'px';

            const containerRect = container.getBoundingClientRect();
            const halfWidth = containerRect.width / 2;
            if (displayXPos > halfWidth) container.scrollLeft = displayXPos - halfWidth;
            else container.scrollLeft = 0;

            updateMonitor(clamped);
        }

        // --- PIANO ROLL RENDERING FUNCTIONS ---
        function renderPianoKeyboard(svg) {
            const keyboardGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

            // Background panel
            const panel = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            panel.setAttribute("x", 0);
            panel.setAttribute("y", 0);
            panel.setAttribute("width", PIANO_ROLL_CONFIG.KEYBOARD_WIDTH);
            panel.setAttribute("height", PIANO_ROLL_CONFIG.SEMITONES * PIANO_ROLL_CONFIG.ROW_HEIGHT);
            panel.setAttribute("fill", "#1e293b");
            keyboardGroup.appendChild(panel);

            // Draw keys from top to bottom (MAX to MIN)
            for (let i = 0; i < PIANO_ROLL_CONFIG.SEMITONES; i++) {
                const relIndex = PIANO_ROLL_CONFIG.SEMITONES - 1 - i; // high notes at top
                const midi = PIANO_ROLL_CONFIG.MIN_MIDI + relIndex;
                const y = i * PIANO_ROLL_CONFIG.ROW_HEIGHT;
                const isBlack = isBlackKeyMidi(midi);

                // Key background
                const keyRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                keyRect.setAttribute("x", 0);
                keyRect.setAttribute("y", y);
                keyRect.setAttribute("width", PIANO_ROLL_CONFIG.KEYBOARD_WIDTH);
                keyRect.setAttribute("height", PIANO_ROLL_CONFIG.ROW_HEIGHT);
                keyRect.setAttribute("fill", isBlack ? "#334155" : "#475569");
                keyRect.setAttribute("stroke", "#1e293b");
                keyRect.setAttribute("stroke-width", "1");
                keyboardGroup.appendChild(keyRect);

                // Note label
                const noteKey = keyFromMidi(midi);
                const [noteName, octave] = noteKey.split('/');
                const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
                label.setAttribute("x", 10);
                label.setAttribute("y", y + PIANO_ROLL_CONFIG.ROW_HEIGHT / 2 + 4);
                label.setAttribute("font-size", "11");
                label.setAttribute("font-family", "Inter, sans-serif");
                label.setAttribute("font-weight", "600");
                label.setAttribute("fill", isBlack ? "#cbd5e1" : "#e2e8f0");
                label.textContent = `${noteName.toUpperCase()}${octave}`;
                keyboardGroup.appendChild(label);

                // Octave separator (thicker line at C notes)
                if (noteName.toLowerCase() === 'c') {
                    const separator = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    separator.setAttribute("x1", 0);
                    separator.setAttribute("y1", y);
                    separator.setAttribute("x2", PIANO_ROLL_CONFIG.KEYBOARD_WIDTH);
                    separator.setAttribute("y2", y);
                    separator.setAttribute("stroke", "#64748b");
                    separator.setAttribute("stroke-width", "2");
                    keyboardGroup.appendChild(separator);
                }
            }

            svg.appendChild(keyboardGroup);
        }

        function renderPianoRollGrid(svg) {
            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const xOffset = PIANO_ROLL_CONFIG.KEYBOARD_WIDTH;
            const totalTicks = getTotalTicks();
            const gridWidth = getLinearXForTick(totalTicks) + 100;

            // Horizontal lines (note rows)
            for (let i = 0; i <= PIANO_ROLL_CONFIG.SEMITONES; i++) {
                const semitoneIndex = PIANO_ROLL_CONFIG.SEMITONES - 1 - i;
                const y = i * PIANO_ROLL_CONFIG.ROW_HEIGHT;
                const isBlack = isBlackKeyMidi(PIANO_ROLL_CONFIG.MIN_MIDI + semitoneIndex);

                // Row background
                if (i < PIANO_ROLL_CONFIG.SEMITONES) {
                    const rowBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rowBg.setAttribute("x", xOffset);
                    rowBg.setAttribute("y", y);
                    rowBg.setAttribute("width", gridWidth);
                    rowBg.setAttribute("height", PIANO_ROLL_CONFIG.ROW_HEIGHT);
                    rowBg.setAttribute("fill", isBlack ? "#f1f5f9" : "#ffffff");
                    gridGroup.appendChild(rowBg);
                }

                // Horizontal grid line
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", xOffset);
                line.setAttribute("y1", y);
                line.setAttribute("x2", xOffset + gridWidth);
                line.setAttribute("y2", y);
                line.setAttribute("stroke", "#e2e8f0");
                line.setAttribute("stroke-width", "1");
                gridGroup.appendChild(line);
            }

            // Vertical lines (measure boundaries) - using LINEAR positioning
            let currentAbsTick = 0;
            for (let m = 0; m < totalMeasures; m++) {
                const settings = getSettingsForMeasure(m);
                const measureTicks = getTicksForTimeSig(settings.time);

                // Measure start line
                const x = xOffset + getLinearXForTick(currentAbsTick);
                const measureLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                measureLine.setAttribute("x1", x);
                measureLine.setAttribute("y1", 0);
                measureLine.setAttribute("x2", x);
                measureLine.setAttribute("y2", PIANO_ROLL_CONFIG.SEMITONES * PIANO_ROLL_CONFIG.ROW_HEIGHT);
                measureLine.setAttribute("stroke", "#94a3b8");
                measureLine.setAttribute("stroke-width", "2");
                gridGroup.appendChild(measureLine);

                // Measure number
                const measureLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                measureLabel.setAttribute("x", x + 5);
                measureLabel.setAttribute("y", 15);
                measureLabel.setAttribute("font-size", "12");
                measureLabel.setAttribute("font-family", "Inter, sans-serif");
                measureLabel.setAttribute("font-weight", "700");
                measureLabel.setAttribute("fill", "#64748b");
                measureLabel.textContent = `M${m + 1}`;
                gridGroup.appendChild(measureLabel);

                // Beat lines (quarter note subdivisions)
                const beatsPerMeasure = parseInt(settings.time.split('/')[0]);
                for (let beat = 1; beat < beatsPerMeasure; beat++) {
                    const beatTick = currentAbsTick + (beat * TICKS_PER_QUARTER);
                    const beatX = xOffset + getLinearXForTick(beatTick);
                    const beatLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    beatLine.setAttribute("x1", beatX);
                    beatLine.setAttribute("y1", 0);
                    beatLine.setAttribute("x2", beatX);
                    beatLine.setAttribute("y2", PIANO_ROLL_CONFIG.SEMITONES * PIANO_ROLL_CONFIG.ROW_HEIGHT);
                    beatLine.setAttribute("stroke", "#cbd5e1");
                    beatLine.setAttribute("stroke-width", "1");
                    beatLine.setAttribute("stroke-dasharray", "4,4");
                    gridGroup.appendChild(beatLine);
                }

                currentAbsTick += measureTicks;
            }

            svg.appendChild(gridGroup);
        }

        
        function sanitizeNotesToPianoRollRange() {
            const tracks = (projectData.mode === 'quartet') ? ['soprano', 'alto', 'tenor', 'bass'] : ['melody'];
            tracks.forEach(trackName => {
                const trackMap = getTrackMap(trackName);
                for (const [tick, note] of Array.from(trackMap.entries())) {
                    if (!note || note.type !== 'note') continue;
                    const inRange = (note.keys || []).every(k => {
                        const midi = midiFromKey(k);
                        return midi !== null && midi >= PIANO_ROLL_CONFIG.MIN_MIDI && midi <= PIANO_ROLL_CONFIG.MAX_MIDI;
                    });
                    if (!inRange) trackMap.delete(tick);
                }
            });
        }

function renderPianoRollNotes(svg) {
            const notesGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const xOffset = PIANO_ROLL_CONFIG.KEYBOARD_WIDTH;

            // Get active tracks
            const tracks = (projectData.mode === 'quartet')
                ? ['soprano', 'alto', 'tenor', 'bass']
                : ['melody'];

            // Render notes for each track
            tracks.forEach(trackName => {
                const trackMap = getTrackMap(trackName);
                const color = PIANO_ROLL_CONFIG.NOTE_COLORS[trackName];

                trackMap.forEach((note, tick) => {
                    if (note.type !== 'note') return;

                    // Calculate position using LINEAR spacing
                    const semitoneIndex = keyToSemitoneIndex(note.keys[0]);
                    if (semitoneIndex === null) return;

                    const x = xOffset + getLinearXForTick(tick);
                    const y = (PIANO_ROLL_CONFIG.SEMITONES - 1 - semitoneIndex) * PIANO_ROLL_CONFIG.ROW_HEIGHT;
                    const width = Math.max(
                        PIANO_ROLL_CONFIG.MIN_NOTE_WIDTH,
                        getLinearXForTick(tick + DURATION_TICKS[note.duration]) - getLinearXForTick(tick) - 2
                    );
                    const height = PIANO_ROLL_CONFIG.ROW_HEIGHT * (1 - PIANO_ROLL_CONFIG.NOTE_PADDING * 2);
                    const yPadded = y + PIANO_ROLL_CONFIG.ROW_HEIGHT * PIANO_ROLL_CONFIG.NOTE_PADDING;

                    // Note rectangle
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x);
                    rect.setAttribute("y", yPadded);
                    rect.setAttribute("width", width);
                    rect.setAttribute("height", height);
                    rect.setAttribute("rx", "4");

                    // Color and styling
                    let fillColor = color;
                    let strokeColor = color;
                    let strokeWidth = 2;
                    let opacity = 0.8;

                    // Selected state
                    if (selectedTick === tick && selectedTrackName === trackName) {
                        strokeColor = "#2563eb";
                        strokeWidth = 3;
                        opacity = 1;
                    }

                    // Ornament state
                    if (note.isOrnament) {
                        fillColor = "#ef4444";
                        strokeColor = "#ef4444";
                    }

                    rect.setAttribute("fill", fillColor);
                    rect.setAttribute("stroke", strokeColor);
                    rect.setAttribute("stroke-width", strokeWidth);
                    rect.setAttribute("opacity", opacity);

                    // Store metadata
                    rect.dataset.tick = tick;
                    rect.dataset.track = trackName;
                    rect.dataset.type = 'note';

                    // Hover effect
                    rect.style.cursor = "grab";
                    rect.addEventListener('mouseenter', function() {
                        if (selectedTick !== tick || selectedTrackName !== trackName) {
                            rect.setAttribute("opacity", 0.9);
                        }
                    });
                    rect.addEventListener('mouseleave', function() {
                        if (selectedTick !== tick || selectedTrackName !== trackName) {
                            rect.setAttribute("opacity", 0.8);
                        }
                    });

                    notesGroup.appendChild(rect);

                    // Dotted note indicator
                    if (String(note.duration).endsWith('.')) {
                        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        dot.setAttribute("cx", x + Math.max(10, width - 8));
                        dot.setAttribute("cy", yPadded + (height / 2));
                        dot.setAttribute("r", "3");
                        dot.setAttribute("fill", strokeColor);
                        dot.setAttribute("opacity", opacity);
                        dot.setAttribute("pointer-events", "none");
                        dot.setAttribute("data-dotted-indicator", "1");
                        notesGroup.appendChild(dot);
                    }
                });
            });

            svg.appendChild(notesGroup);
        }

        function downloadMIDI() {
            try {
                const isQuartet = projectData.mode === 'quartet';
                const trackNames = isQuartet ? ['soprano', 'alto', 'tenor', 'bass'] : ['melody'];
                const PPQ = 128; const TICKS_TO_MIDI = PPQ / TICKS_PER_QUARTER;
                const bpm = parseInt(document.getElementById('tempo-slider').value);
                const microsecondsPerQuarter = Math.round(60000000 / bpm);
                const channelByTrack = { melody: 0, soprano: 0, alto: 1, tenor: 2, bass: 3 };
                let allTrackChunks = [];
                const strToBytes = (s) => s.split('').map(c => c.charCodeAt(0));
                trackNames.forEach((trackName, index) => {
                    let trackEvents = [];
                    if (index === 0) {
                        trackEvents.push({ tickMidi: 0, type: 'meta', data: [0xFF, 0x51, 0x03, (microsecondsPerQuarter >> 16) & 0xFF, (microsecondsPerQuarter >> 8) & 0xFF, microsecondsPerQuarter & 0xFF] });
                        // Emit key_signature meta-messages at measure boundaries where key changes
                        const measureStartTicks = {};
                        let keySigAcc = 0;
                        for (let m = 0; m < totalMeasures; m++) {
                            measureStartTicks[keySigAcc * TICKS_TO_MIDI] = getSettingsForMeasure(m).key;
                            keySigAcc += getTicksForTimeSig(getSettingsForMeasure(m).time);
                        }
                        let lastKey = null;
                        for (const [tickStr, key] of Object.entries(measureStartTicks).sort((a, b) => Number(a[0]) - Number(b[0]))) {
                            if (key !== lastKey) {
                                trackEvents.push({ tickMidi: Number(tickStr), type: 'meta', data: buildKeySignatureBytes(key) });
                                lastKey = key;
                            }
                        }
                    }
                    const trackMap = getTrackMap(trackName);
                    const processed = new Set();
                    Array.from(trackMap.keys()).sort((a,b)=>a-b).forEach(tick => {
                        if (processed.has(tick)) return;
                        const note = trackMap.get(tick);
                        if (note.type !== 'note') return;
                        let totalDur = DURATION_TICKS[note.duration];
                        let curr = note, currTick = tick;
                        while(curr.isTied) {
                             const nxtTick = currTick + DURATION_TICKS[curr.duration];
                             if(trackMap.has(nxtTick)) {
                                 const nxt = trackMap.get(nxtTick);
                                 if(nxt.type==='note' && nxt.keys[0]===curr.keys[0]) { totalDur+=DURATION_TICKS[nxt.duration]; processed.add(nxtTick); curr=nxt; currTick=nxtTick; } else break;
                             } else break;
                        }
                        const [key, oct] = note.keys[0].split('/');
                        const pitch = getMidiPitch(key, oct);
                        const ch = channelByTrack[trackName] ?? 0;
                        trackEvents.push({ tickMidi: tick * TICKS_TO_MIDI, type: 'on', ch, pitch, vel: 100 });
                        trackEvents.push({ tickMidi: (tick + totalDur) * TICKS_TO_MIDI, type: 'off', ch, pitch, vel: 0 });
                    });
                    trackEvents.sort((a, b) => (a.tickMidi - b.tickMidi) || ((a.type === 'off') ? -1 : 1));
                    let trackBytes = [];
                    const addByte = (b) => trackBytes.push(b & 0xFF);
                    const addVLQ = (val) => {
                        let buffer = val & 0x7F;
                        while ((val >>= 7)) { buffer <<= 8; buffer |= ((val & 0x7F) | 0x80); }
                        while (true) { addByte(buffer); if (buffer & 0x80) buffer >>= 8; else break; }
                    };
                    let lastTick = 0;
                    trackEvents.forEach(ev => {
                        addVLQ(ev.tickMidi - lastTick); lastTick = ev.tickMidi;
                        if (ev.type === 'meta') ev.data.forEach(addByte);
                        else { addByte((ev.type === 'on' ? 0x90 : 0x80) + (ev.ch & 0x0F)); addByte(ev.pitch & 0x7F); addByte(ev.vel & 0x7F); }
                    });
                    addVLQ(0); addByte(0xFF); addByte(0x2F); addByte(0x00);
                    const len = trackBytes.length;
                    allTrackChunks.push(...strToBytes('MTrk'), (len >> 24) & 0xFF, (len >> 16) & 0xFF, (len >> 8) & 0xFF, len & 0xFF, ...trackBytes);
                });
                const numTracks = trackNames.length;
                const header = [...strToBytes('MThd'), 0,0,0,6, 0,1, (numTracks>>8)&0xFF, numTracks&0xFF, (PPQ>>8)&0xFF, PPQ&0xFF];
                const blob = new Blob([new Uint8Array([...header, ...allTrackChunks])], { type: "audio/midi" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = isQuartet ? 'composition_quartet.mid' : 'composition_single.mid';
                document.body.appendChild(a); a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            } catch (err) { alert("Error MIDI: " + err.message); }
        }

        function getMidiPitch(key, octaveStr) {
            const noteMap = { 'c': 0, 'cn': 0, 'c#': 1, 'db': 1, 'd': 2, 'dn': 2, 'd#': 3, 'eb': 3, 'e': 4, 'en': 4, 'e#': 5, 'fb': 4, 'f': 5, 'fn': 5, 'f#': 6, 'gb': 6, 'g': 7, 'gn': 7, 'g#': 8, 'ab': 8, 'a': 9, 'an': 9, 'a#': 10, 'bb': 10, 'b': 11, 'bn': 11, 'b#': 0, 'cb': 11, 'c##': 2, 'd##': 4, 'e##': 6, 'f##': 7, 'g##': 9, 'a##': 11, 'b##': 1, 'cbb': 10, 'dbb': 0, 'ebb': 2, 'fbb': 3, 'gbb': 5, 'abb': 7, 'bbb': 9 };
            const cleanKey = key.toLowerCase();
            let octave = parseInt(octaveStr);
            if (cleanKey === 'cb') octave -= 1;
            if (cleanKey === 'b#') octave += 1;
            if (cleanKey === 'cbb') octave -= 1;
            if (cleanKey === 'b##') octave += 1;
            return (octave + 1) * 12 + (noteMap[cleanKey] ?? 0);
        }

        function buildKeySignatureBytes(key) {
            // MIDI key signature meta-message: FF 59 02 sf mi
            // sf = number of sharps (positive) or flats (negative, as two's complement)
            // mi = 0 (major)
            const sfMap = {
                'Cb': -7, 'Gb': -6, 'Db': -5, 'Ab': -4, 'Eb': -3, 'Bb': -2, 'F': -1,
                'C': 0, 'G': 1, 'D': 2, 'A': 3, 'E': 4, 'B': 5, 'F#': 6, 'C#': 7
            };
            const sf = sfMap[key] ?? 0;
            return [0xFF, 0x59, 0x02, sf < 0 ? (256 + sf) : sf, 0x00];
        }
    </script>
